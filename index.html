<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Attendance">
<title>Attendance</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
:root{
  --page:#F2F2F7;--card:#FFFFFF;
  --shadow:0 1px 4px rgba(0,0,0,0.08),0 0 0 0.5px rgba(0,0,0,0.06);
  --shadow-sm:0 1px 2px rgba(0,0,0,0.06),0 0 0 0.5px rgba(0,0,0,0.05);
  --text:#1D1D1F;--text2:#6E6E73;--text3:#AEAEB2;
  --fill:#E5E5EA;--fill2:#F2F2F7;
  --accent:#5856D6;--accent-dim:#3634A3;
  --c-work:#34C759;--c-work-bg:#EAFFF1;--c-work-soft:#C8EFD4;--c-work-text:#1A6B30;
  --c-absent:#FF3B30;--c-absent-bg:#FFF2F1;--c-absent-soft:#FFD2CF;--c-absent-text:#B8251C;
  --c-early:#FF9500;--c-early-bg:#FFF8EC;--c-early-soft:#FFE5B0;--c-early-text:#A05D00;
  --c-leave:#007AFF;--c-leave-bg:#EFF6FF;--c-leave-soft:#C0D8FF;--c-leave-text:#0A52B8;
  --r-packer:#0A84FF;--r-packer-soft:#C0D8FF;
  --r-runner:#636366;--r-runner-soft:#E5E5EA;
  --r-boxmaker:#FF453A;--r-boxmaker-soft:#FFD2CF;
  --safe-t:env(safe-area-inset-top);--safe-b:env(safe-area-inset-bottom);
}
@media(prefers-color-scheme:dark){
  :root{
    --page:#000;--card:#1C1C1E;
    --shadow:0 1px 6px rgba(0,0,0,0.5),0 0 0 0.5px rgba(255,255,255,0.07);
    --shadow-sm:0 1px 3px rgba(0,0,0,0.4),0 0 0 0.5px rgba(255,255,255,0.06);
    --text:#FFF;--text2:#AEAEB2;--text3:#636366;
    --fill:#2C2C2E;--fill2:#1C1C1E;
    --accent:#6E6BFF;--accent-dim:#4A48C0;
    --c-work-bg:#0C2416;--c-work-soft:#1E4A2E;--c-work-text:#4CD97A;
    --c-absent-bg:#280D0C;--c-absent-soft:#3C1614;--c-absent-text:#FF6961;
    --c-early-bg:#261700;--c-early-soft:#3A2600;--c-early-text:#FFAC33;
    --c-leave-bg:#0C1828;--c-leave-soft:#142238;--c-leave-text:#4DA8FF;
    --r-packer-soft:#142238;--r-runner-soft:#3A3A3C;--r-boxmaker-soft:#3C1614;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{min-height:100%;background:var(--page)}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;color:var(--text);overscroll-behavior:none}
.app{max-width:600px;margin:0 auto;padding-top:calc(var(--safe-t)+10px);padding-bottom:calc(32px + var(--safe-b));min-height:100vh}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;gap:8px;padding:0 12px 10px}
.wknav{display:flex;align-items:center;gap:4px}
.navarrow{width:34px;height:34px;border-radius:50%;border:none;background:var(--card);box-shadow:var(--shadow-sm);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;user-select:none}
.navarrow:active{background:var(--fill);transform:scale(0.88)}
.wklbl{font-size:13px;font-weight:700;color:var(--text);min-width:88px;text-align:center;padding:5px 2px;cursor:pointer;border-radius:8px;user-select:none;line-height:1}
.wklbl span{display:block;font-size:10px;font-weight:500;color:var(--text3);margin-top:2px}
.wklbl:active{background:var(--fill)}
.searchwrap{position:relative;flex:1}
.searchbox{width:100%;height:36px;border:none;border-radius:12px;padding:0 28px 0 32px;font-size:16px;background:var(--card);color:var(--text);box-shadow:var(--shadow-sm);-webkit-appearance:none}
.searchbox:focus{outline:none;box-shadow:0 0 0 2px var(--accent)}
.searchicon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.searchclear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--text3);border:none;border-radius:50%;width:16px;height:16px;color:#fff;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.actbtn{width:36px;height:36px;border-radius:12px;border:none;background:var(--card);box-shadow:var(--shadow-sm);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;user-select:none}
.actbtn:active{background:var(--fill);transform:scale(0.9)}

/* ── Sticky head ── */
.sticky-head{position:sticky;top:0;z-index:10;background:var(--page);padding:0 12px 8px}

/* ── Day strip ── */
.dayscroll{display:flex;gap:6px;margin-bottom:8px}
.daybtn{flex:1;height:68px;border:none;border-radius:16px;background:var(--card);box-shadow:var(--shadow-sm);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;user-select:none;position:relative;overflow:hidden}
.daybtn:active{transform:scale(0.91)}
.daybtn.is-today .dnum{color:var(--accent)}
.daybtn.active{background:var(--accent);box-shadow:0 4px 14px rgba(88,86,214,0.4)}
.daybtn.active .dday{color:rgba(255,255,255,0.75)}
.daybtn.active .dnum{color:#fff}
.daybtn.active .dpip{background:rgba(255,255,255,0.6)}
.dday{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:1px}
.dnum{font-size:24px;font-weight:700;color:var(--text);line-height:1}
.dpip{width:4px;height:4px;border-radius:50%;background:var(--accent);margin-top:4px}
.dpip-ph{width:4px;height:4px;margin-top:4px}

/* ── Role filter tabs ── */
.roletabs{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:8px}
.rtab{
  height:52px;padding:0 6px;border:none;border-radius:14px;
  font-size:11px;font-weight:700;cursor:pointer;
  white-space:nowrap;user-select:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  background:var(--card);color:var(--text2);box-shadow:var(--shadow-sm);
}
.rtab:active{transform:scale(0.94);opacity:0.8}
.rtab-count{font-size:18px;font-weight:800;line-height:1;color:var(--text)}
.rtab-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.2px}
.rtab.active-all{background:var(--accent);box-shadow:0 3px 12px rgba(88,86,214,0.35)}
.rtab.active-all .rtab-count,.rtab.active-all .rtab-label{color:#fff}
.rtab.active-packer{background:var(--r-packer);box-shadow:0 3px 12px rgba(10,132,255,0.35)}
.rtab.active-packer .rtab-count,.rtab.active-packer .rtab-label{color:#fff}
.rtab.active-runner{background:#636366;box-shadow:0 3px 12px rgba(99,99,102,0.3)}
.rtab.active-runner .rtab-count,.rtab.active-runner .rtab-label{color:#fff}
.rtab.active-boxmaker{background:var(--r-boxmaker);box-shadow:0 3px 12px rgba(255,69,58,0.35)}
.rtab.active-boxmaker .rtab-count,.rtab.active-boxmaker .rtab-label{color:#fff}

/* ── Stats ── */
.statrow{display:flex;gap:6px}
.stat{flex:1;border-radius:14px;padding:9px 4px 7px;text-align:center;box-shadow:var(--shadow-sm);cursor:pointer;user-select:none}
.stat:active{transform:scale(0.96);opacity:0.8}
.stat-ico{font-size:15px;margin-bottom:2px}
.statnum{font-size:22px;font-weight:800;line-height:1}
.statlbl{font-size:9px;font-weight:600;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}
.stat.s-w{background:var(--c-work-bg)}.stat.s-a{background:var(--c-absent-bg)}
.stat.s-e{background:var(--c-early-bg)}.stat.s-l{background:var(--c-leave-bg)}

/* ── Quick bar ── */
.qbar{display:flex;gap:6px;padding:0 12px;margin-bottom:8px}
.qbtn{flex:1;height:34px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;user-select:none}
.qbtn:active{opacity:0.7;transform:scale(0.96)}
.qbtn.qall{background:var(--c-work-soft);color:var(--c-work-text)}
.qbtn.qclear{background:var(--fill);color:var(--text2)}

/* ── Section heading ── */
.section-head{display:flex;align-items:center;gap:8px;padding:10px 12px 4px}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text3)}
.section-count{font-size:11px;font-weight:600;background:var(--fill);color:var(--text2);border-radius:20px;padding:1px 7px}

/* ── Staff rows ── */
.rows{display:flex;flex-direction:column;gap:5px;padding:0 12px}
.row{display:flex;align-items:center;padding:0 8px 0 14px;border-radius:16px;background:var(--card);box-shadow:var(--shadow);gap:10px;min-height:62px;position:relative;touch-action:pan-y}
.row.s-work  {background:var(--c-work-bg)}.row.s-absent{background:var(--c-absent-bg)}
.row.s-early {background:var(--c-early-bg)}.row.s-leave {background:var(--c-leave-bg)}
.row-stripe{width:4px;height:100%;position:absolute;left:0;top:0;border-radius:16px 0 0 16px}
.row[data-role=packer]   .row-stripe{background:var(--r-packer)}
.row[data-role=runner]   .row-stripe{background:var(--r-runner)}
.row[data-role=boxmaker] .row-stripe{background:var(--r-boxmaker)}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.row[data-role=packer]   .avatar{background:var(--r-packer-soft);color:var(--r-packer)}
.row[data-role=runner]   .avatar{background:var(--r-runner-soft);color:var(--r-runner)}
.row[data-role=boxmaker] .avatar{background:var(--r-boxmaker-soft);color:var(--r-boxmaker)}
.row.s-work   .avatar{background:var(--c-work-soft);color:var(--c-work-text)}
.row.s-absent .avatar{background:var(--c-absent-soft);color:var(--c-absent-text)}
.row.s-early  .avatar{background:var(--c-early-soft);color:var(--c-early-text)}
.row.s-leave  .avatar{background:var(--c-leave-soft);color:var(--c-leave-text)}
.name-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.nm{font-size:15px;font-weight:600;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.info-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.role-chip{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.2px;align-self:flex-start}
.role-chip.rc-packer  {background:var(--r-packer-soft);color:var(--r-packer)}
.role-chip.rc-runner  {background:var(--r-runner-soft);color:var(--r-runner)}
.role-chip.rc-boxmaker{background:var(--r-boxmaker-soft);color:var(--r-boxmaker)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px 2px 6px;border-radius:20px;font-size:11px;font-weight:700;align-self:flex-start}
.badge i{font-size:11px}
.badge.b-work  {background:var(--c-work);  color:#fff}
.badge.b-absent{background:var(--c-absent);color:#fff}
.badge.b-early {background:var(--c-early); color:#fff}
.badge.b-leave {background:var(--c-leave); color:#fff}
.badge.b-none  {display:none}
.sbs{display:flex;gap:3px;flex-shrink:0}
.sb{width:38px;height:48px;border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;user-select:none;transition:transform 0.1s}
.sb:active{transform:scale(0.76)}
.sb[data-s=work]  {background:var(--c-work-soft);  color:var(--c-work-text)}
.sb[data-s=absent]{background:var(--c-absent-soft);color:var(--c-absent-text)}
.sb[data-s=early] {background:var(--c-early-soft); color:var(--c-early-text)}
.sb[data-s=leave] {background:var(--c-leave-soft); color:var(--c-leave-text)}
.row.s-work   .sb[data-s=work]  {background:var(--c-work);  color:#fff;box-shadow:0 2px 10px rgba(52,199,89,0.5)}
.row.s-absent .sb[data-s=absent]{background:var(--c-absent);color:#fff;box-shadow:0 2px 10px rgba(255,59,48,0.5)}
.row.s-early  .sb[data-s=early] {background:var(--c-early); color:#fff;box-shadow:0 2px 10px rgba(255,149,0,0.5)}
.row.s-leave  .sb[data-s=leave] {background:var(--c-leave); color:#fff;box-shadow:0 2px 10px rgba(0,122,255,0.5)}
.empty{text-align:center;padding:56px 16px;color:var(--text3);font-size:14px;line-height:1.6}
.empty i{font-size:36px;display:block;margin-bottom:10px;opacity:0.5}

/* ── Toast ── */
.toast{position:fixed;bottom:calc(24px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(90px);background:#1C1C1E;color:#fff;border-radius:16px;padding:12px 18px;display:flex;align-items:center;gap:16px;font-size:14px;font-weight:500;z-index:400;transition:transform 0.28s cubic-bezier(0.34,1.4,0.64,1);white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.45);pointer-events:none;user-select:none}
@media(prefers-color-scheme:dark){.toast{background:#3A3A3C}}
.toast.show{transform:translateX(-50%) translateY(0);pointer-events:auto}
.toast-undo{background:none;border:none;color:#64D2FF;font-size:14px;font-weight:700;cursor:pointer;padding:4px 0}

/* ── Overlay / Sheet ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding-bottom:var(--safe-b)}
.sheet{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:600px;padding:20px 18px calc(20px + var(--safe-b));max-height:92vh;display:flex;flex-direction:column}
.sheet-handle{width:40px;height:4px;background:var(--fill);border-radius:2px;margin:0 auto 18px;flex-shrink:0}
.sheetheader{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-shrink:0}
.sheettitle{font-size:18px;font-weight:700;color:var(--text)}
.closebtn{width:30px;height:30px;border-radius:50%;background:var(--fill);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:13px}
.closebtn:active{background:var(--fill2)}

/* Report text box */
.rt{font-size:13px;line-height:1.9;color:var(--text);white-space:pre-wrap;background:var(--fill2);padding:14px 16px;border-radius:14px;margin-bottom:12px;overflow-y:auto;flex:1;min-height:0}
.bigbtn{width:100%;padding:15px;border:none;border-radius:14px;background:var(--fill2);cursor:pointer;font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;flex-shrink:0}
.bigbtn:last-child{margin-bottom:0}.bigbtn:active{opacity:0.7}
.bigbtn.primary{background:var(--accent);color:#fff}.bigbtn.primary:active{background:var(--accent-dim)}
.bigbtn.danger{background:var(--c-absent-bg);color:var(--c-absent-text)}

/* ── Settings: Full-page staff editor ── */
.settings-page{
  position:fixed;inset:0;background:var(--page);z-index:200;
  display:flex;flex-direction:column;
  padding-top:calc(var(--safe-t)+0px);
  padding-bottom:calc(var(--safe-b)+0px);
  max-width:600px;margin:0 auto;
}
.settings-topbar{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;background:var(--card);
  box-shadow:0 0.5px 0 rgba(0,0,0,0.12);
  flex-shrink:0;
}
.settings-title{flex:1;font-size:17px;font-weight:700;color:var(--text)}
.settings-backbtn{
  width:34px;height:34px;border:none;background:none;
  color:var(--accent);font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;padding:0;
}
.settings-addbtn{
  height:34px;padding:0 14px;border:none;border-radius:10px;
  background:var(--accent);color:#fff;font-size:13px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:5px;
}
.settings-addbtn:active{background:var(--accent-dim)}

/* Search in settings */
.settings-search{padding:10px 16px;flex-shrink:0}
.settings-search input{
  width:100%;height:36px;border:none;border-radius:12px;
  padding:0 12px 0 36px;font-size:16px;
  background:var(--fill2);color:var(--text);-webkit-appearance:none;
}
.settings-search input:focus{outline:none;box-shadow:0 0 0 2px var(--accent)}
.settings-search{position:relative}
.ss-icon{position:absolute;left:26px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}

/* Role filter pills in settings */
.settings-rolefilter{display:flex;gap:6px;padding:0 16px 10px;overflow-x:auto;flex-shrink:0}
.settings-rolefilter::-webkit-scrollbar{display:none}
.srf-btn{height:28px;padding:0 12px;border:none;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;user-select:none;background:var(--fill2);color:var(--text2);flex-shrink:0}
.srf-btn:active{opacity:0.7}
.srf-btn.on-all{background:var(--accent);color:#fff}
.srf-btn.on-packer{background:var(--r-packer);color:#fff}
.srf-btn.on-runner{background:#636366;color:#fff}
.srf-btn.on-boxmaker{background:var(--r-boxmaker);color:#fff}

/* Staff list in settings */
.settings-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 16px}
.settings-list-inner{display:flex;flex-direction:column;gap:4px}

/* Group header in staff list */
.slist-group-head{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;
  color:var(--text3);padding:14px 4px 6px;
}

/* Staff row in settings */
.srow{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border-radius:16px;
  padding:12px 14px;cursor:pointer;
  box-shadow:var(--shadow-sm);
  -webkit-touch-callout:none;user-select:none;
}
.srow:active{opacity:0.75;transform:scale(0.99)}
.srow-av{
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;flex-shrink:0;
}
.srow-av.rc-packer  {background:var(--r-packer-soft);color:var(--r-packer)}
.srow-av.rc-runner  {background:var(--r-runner-soft);color:var(--r-runner)}
.srow-av.rc-boxmaker{background:var(--r-boxmaker-soft);color:var(--r-boxmaker)}
.srow-info{flex:1;min-width:0}
.srow-name{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srow-role{margin-top:2px;display:flex;gap:4px;flex-wrap:wrap}
.srow-chip{
  font-size:10px;font-weight:700;border-radius:20px;
  padding:1px 7px;display:inline-block;
}
.srow-chip.rc-packer  {background:var(--r-packer-soft);color:var(--r-packer)}
.srow-chip.rc-runner  {background:var(--r-runner-soft);color:var(--r-runner)}
.srow-chip.rc-boxmaker{background:var(--r-boxmaker-soft);color:var(--r-boxmaker)}
.srow-arrow{color:var(--text3);font-size:14px;flex-shrink:0}

/* Edit employee sheet */
.edit-sheet{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:600px;padding:20px 18px calc(24px + var(--safe-b));display:flex;flex-direction:column;gap:0}
.edit-avatar-wrap{display:flex;justify-content:center;margin-bottom:18px}
.edit-av{
  width:72px;height:72px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:700;
}
.edit-av.rc-packer  {background:var(--r-packer-soft);color:var(--r-packer)}
.edit-av.rc-runner  {background:var(--r-runner-soft);color:var(--r-runner)}
.edit-av.rc-boxmaker{background:var(--r-boxmaker-soft);color:var(--r-boxmaker)}
.edit-av.rc-none    {background:var(--fill);color:var(--text3)}

/* Field rows */
.field-label{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;padding-left:4px}
.field-input{
  width:100%;height:50px;border:none;border-radius:14px;
  padding:0 14px;font-size:17px;font-weight:500;
  background:var(--fill2);color:var(--text);
  -webkit-appearance:none;margin-bottom:16px;
}
.field-input:focus{outline:none;box-shadow:0 0 0 2px var(--accent)}

/* Role picker grid */
.role-grid{display:flex;gap:8px;margin-bottom:20px}
.role-card{
  flex:1;padding:12px 8px;border:none;border-radius:16px;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;
  background:var(--fill2);user-select:none;
  border:2.5px solid transparent;transition:border-color 0.15s,background 0.15s;
}
.role-card:active{opacity:0.75}
.role-card.sel-packer  {background:var(--r-packer-soft);border-color:var(--r-packer)}
.role-card.sel-runner  {background:var(--r-runner-soft);border-color:var(--r-runner)}
.role-card.sel-boxmaker{background:var(--r-boxmaker-soft);border-color:var(--r-boxmaker)}
.role-card-dot{width:20px;height:20px;border-radius:50%}
.role-card-dot.rc-packer  {background:var(--r-packer)}
.role-card-dot.rc-runner  {background:var(--r-runner)}
.role-card-dot.rc-boxmaker{background:var(--r-boxmaker)}
.role-card-lbl{font-size:11px;font-weight:700;color:var(--text2)}
.role-card.sel-packer   .role-card-lbl{color:var(--r-packer)}
.role-card.sel-runner   .role-card-lbl{color:var(--r-runner)}
.role-card.sel-boxmaker .role-card-lbl{color:var(--r-boxmaker)}

.edit-save{width:100%;padding:16px;border:none;border-radius:16px;background:var(--accent);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px}
.edit-save:active{background:var(--accent-dim)}
.edit-delete{width:100%;padding:14px;border:none;border-radius:16px;background:var(--c-absent-bg);color:var(--c-absent-text);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.edit-delete:active{opacity:0.7}

/* Add employee sheet */
.add-sheet-inner{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:600px;padding:20px 18px calc(24px + var(--safe-b));display:flex;flex-direction:column}
</style>
</head>
<body>

<div id="toast" class="toast">
  <span id="toast-msg">Updated</span>
  <button class="toast-undo" onclick="undoLast()">Undo</button>
</div>
<div id="root"></div>

<script>
const DEFAULT_STAFF=[

  {n:"Aporo Aruba",       r:"packer"},
  {n:"Avarua",            r:"packer"},
  {n:"Ben McNicholas",    r:"packer"},
  {n:"Charli Murphy",     r:"packer"},
  {n:"Dewi",              r:"packer"},
  {n:"Emerald",           r:"packer"},

  {n:"Hussein Koech",     r:"runner"},
  {n:"Isabel Albinus",    r:"packer"},
  {n:"Jasmin Lulio",      r:"boxmaker"},
  {n:"Jet Crozier",       r:"packer"},
  {n:"June",              r:"boxmaker"},
  {n:"Kacu",              r:"runner"},
  {n:"Karen Brown",       r:"packer"},
  {n:"Koni Latu",         r:"runner"},
  {n:"Kyla-Le Perry",     r:"packer"},
  {n:"Marta",             r:"packer"},
  {n:"Natalia Tuitama",   r:"boxmaker"},
  {n:"Norhaffezan (Nora)",r:"packer"},
  {n:"Paula Leti",        r:"packer"},
  {n:"Ryan Donald",       r:"boxmaker"},
  {n:"Erina Edmonds",     r:"packer"},
  {n:"Sinuch Soy",        r:"packer"},
  {n:"Toanui Moeara",     r:"runner"},
  {n:"Vikki Rakei",       r:"packer"},
];

const ROLES=["packer","runner","boxmaker"];
const ROLE_LABELS={packer:"Packer",runner:"Runner",boxmaker:"Box maker"};
const ROLE_EMOJI={packer:"🔵",runner:"⚪️",boxmaker:"🔴"};
const DAYS=["Mon","Tue","Wed","Thu","Fri"];
const SI=[["work","ti-check","At work"],["absent","ti-x","Absent"],["early","ti-logout","Left early"],["leave","ti-calendar-off","Leave/sick"]];
const BADGE_LABELS={work:"At work",absent:"Absent",early:"Left early",leave:"On leave"};
const BADGE_ICONS={work:"ti-check",absent:"ti-x",early:"ti-logout",leave:"ti-calendar-off"};

let staff=[...DEFAULT_STAFF.map(s=>({...s}))];
let dat={},q="",view="main",sortAZ=false,roleFilter="all";
let wo=0,ad=0,lastAction=null,undoTimer=null;
// Settings sub-state
let sEditPerson=null; // person being edited (object) or null
let sView="list";     // "list" | "edit" | "add"
let sQ="",sRoleFilter="all";
// Temp edit state
let editName="",editRole="packer";

function hap(s="light"){try{if(navigator.vibrate)navigator.vibrate(s==="light"?10:20);}catch(e){}}

function save(){
  try{
    localStorage.setItem("att6_dat",JSON.stringify(dat));
    localStorage.setItem("att6_staff",JSON.stringify(staff));
    localStorage.setItem("att6_prefs",JSON.stringify({sortAZ,roleFilter}));
  }catch(e){}
}
function load(){
  try{
    const d=localStorage.getItem("att6_dat"),s=localStorage.getItem("att6_staff"),p=localStorage.getItem("att6_prefs");
    if(d)dat=JSON.parse(d);
    if(s)staff=JSON.parse(s);
    if(p){const pp=JSON.parse(p);sortAZ=pp.sortAZ||false;roleFilter=pp.roleFilter||"all";}
  }catch(e){}
}

/* ── Date helpers ── */
function mon(o){const d=new Date(),dy=d.getDay();d.setDate(d.getDate()-(dy===0?6:dy-1)+o*7);d.setHours(0,0,0,0);return d;}
function wdates(o){const m=mon(o);return Array.from({length:5},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d;});}
function fd(d){return d.toLocaleDateString("en-AU",{day:"numeric",month:"short"});}
function ffl(d){return d.toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"});}
function dk(w,d){return"w"+w+"d"+d;}
function gs(p){return((dat[dk(wo,ad)]||{})[p])||"";}
function todayIdx(){const dy=new Date().getDay();if(dy===0||dy===6)return 4;return dy-1;}
function isToday(i){if(wo!==0)return false;const dy=new Date().getDay();if(dy===0||dy===6)return false;return(dy-1)===i;}
function weekLabel(){const d=wdates(wo);const r=fd(d[0])+" – "+fd(d[4]);if(wo===0)return{main:"This week",sub:r};if(wo===-1)return{main:"Last week",sub:r};if(wo===1)return{main:"Next week",sub:r};return{main:r,sub:""};}
function initials(n){return n.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();}
function dayStats(i){
  const dd=dat[dk(wo,i)]||{};
  let absent=0,early=0,leave=0;
  staff.forEach(s=>{const st=dd[s.n]||"";if(st==="absent")absent++;else if(st==="early")early++;else if(st==="leave")leave++;});
  return{absent,early,leave};
}

/* ── Main actions ── */
function toggle(p,s){
  const k=dk(wo,ad);if(!dat[k])dat[k]={};
  lastAction={k,p,prev:dat[k][p]||""};
  const nv=dat[k][p]===s?"":s;
  dat[k][p]=nv;hap("light");save();
  patchRow(p);updateStats();updateDayPip(ad);
  showToast(nv?BADGE_LABELS[nv]+" ✓":"Cleared");
}
function markAllWork(){
  const k=dk(wo,ad);if(!dat[k])dat[k]={};
  const vis=getFiltered();
  const all=vis.every(s=>dat[k][s.n]==="work");
  vis.forEach(s=>{dat[k][s.n]=all?"":"work";});
  hap("medium");save();render();showToast(all?"Cleared all":"All at work");
}
function clearDay(){const k=dk(wo,ad);dat[k]={};hap("medium");save();render();showToast("Day cleared");}
function cw(dir){wo+=dir;hap("light");render();}
function goToday(){wo=0;ad=todayIdx();q="";render();}
function selDay(i){ad=i;hap("light");render();}
function setRoleFilter(r){roleFilter=r;save();render();}

function getFiltered(){
  let list=sortAZ?[...staff].sort((a,b)=>a.n.localeCompare(b.n)):[...staff];
  if(roleFilter!=="all")list=list.filter(s=>s.r===roleFilter);
  if(q)list=list.filter(s=>s.n.toLowerCase().includes(q.toLowerCase()));
  return list;
}

/* ── DOM patchers ── */
function patchRow(p){
  const el=document.querySelector(`.row[data-p="${CSS.escape(p)}"]`);
  if(!el)return;
  const st=gs(p);
  const role=el.getAttribute("data-role");
  el.className="row"+(st?" s-"+st:"");
  el.setAttribute("data-role",role);
  const badge=el.querySelector(".badge");
  if(badge){
    badge.className="badge"+(st?" b-"+st:" b-none");
    badge.innerHTML=st?`<i class="ti ${BADGE_ICONS[st]}"></i>${BADGE_LABELS[st]}`:"";
  }
}
function updateStats(){
  const s=dayStats(ad);
  const w=staff.length-s.absent-s.early-s.leave;
  [["stat-w",w],["stat-a",s.absent],["stat-e",s.early],["stat-l",s.leave]].forEach(([id,v])=>{
    const el=document.getElementById(id);if(el)el.textContent=v;
  });
}
function updateDayPip(i){
  const has=Object.values(dat[dk(wo,i)]||{}).some(v=>v);
  const btn=document.querySelector(`.daybtn[data-day="${i}"]`);if(!btn)return;
  const pip=btn.querySelector(".dpip"),ph=btn.querySelector(".dpip-ph");
  if(has&&i!==ad){if(!pip&&ph)ph.className="dpip";}
  else{if(pip&&i!==ad)pip.className="dpip-ph";}
}

/* ── Toast ── */
function showToast(msg="Updated"){
  const t=document.getElementById("toast"),m=document.getElementById("toast-msg");
  if(m&&msg)m.textContent=msg;t&&t.classList.add("show");
  clearTimeout(undoTimer);undoTimer=setTimeout(hideToast,3000);
}
function hideToast(){document.getElementById("toast")?.classList.remove("show");clearTimeout(undoTimer);}
function undoLast(){
  if(!lastAction)return;
  const{k,p,prev}=lastAction;if(!dat[k])dat[k]={};
  dat[k][p]=prev;lastAction=null;hap("light");save();hideToast();render();
}

/* ── Staff editor ── */
function openSettings(){view="settings";sView="list";sQ="";sEditPerson=null;render();}
function closeSettings(){view="main";render();}

function openEditPerson(n){
  const s=staff.find(x=>x.n===n);if(!s)return;
  sEditPerson={...s};
  editName=s.n;editRole=s.r;
  sView="edit";renderSettings();
}
function openAddPerson(){
  sEditPerson=null;editName="";editRole="packer";
  sView="add";renderSettings();
  setTimeout(()=>document.getElementById("edit-name-input")?.focus(),80);
}

function saveEdit(){
  const newName=document.getElementById("edit-name-input")?.value.trim()||editName;
  const newRole=editRole;
  if(!newName)return;

  if(sView==="add"){
    // New person
    if(staff.find(s=>s.n===newName)){showToast("Name already exists");return;}
    staff.push({n:newName,r:newRole});
    save();showToast(newName+" added");
  } else {
    // Editing existing
    const oldName=sEditPerson.n;
    const idx=staff.findIndex(x=>x.n===oldName);
    if(idx<0)return;
    // If name changed, update attendance data keys
    if(newName!==oldName){
      Object.values(dat).forEach(day=>{
        if(day[oldName]!==undefined){day[newName]=day[oldName];delete day[oldName];}
      });
    }
    staff[idx]={n:newName,r:newRole};
    save();showToast("Saved");
  }
  sView="list";sEditPerson=null;renderSettings();
}

function deletePerson(){
  const name=sEditPerson?.n;if(!name)return;
  if(!confirm("Remove "+name+" from staff? This also removes their attendance history."))return;
  staff=staff.filter(x=>x.n!==name);
  Object.values(dat).forEach(day=>delete day[name]);
  save();showToast(name+" removed");
  sView="list";sEditPerson=null;renderSettings();
}

function setEditRole(r){
  editRole=r;
  // Update the role cards UI without full re-render
  document.querySelectorAll(".role-card").forEach(c=>{
    const cr=c.getAttribute("data-role");
    c.className="role-card"+(cr===r?" sel-"+cr:"");
  });
  // Update avatar
  const av=document.getElementById("edit-av");
  if(av)av.className=`edit-av ${editRole?"rc-"+editRole:"rc-none"}`;
  // Update initials (avatar stays same, just colour)
}

/* ── Settings render ── */
function renderSettings(){
  const existing=document.getElementById("settings-root");
  if(!existing){
    // First time: inject settings page
    document.getElementById("root").insertAdjacentHTML("afterend",`<div id="settings-root"></div>`);
  }

  if(sView==="list"){
    let list=[...staff].sort((a,b)=>a.n.localeCompare(b.n));
    if(sRoleFilter!=="all")list=list.filter(s=>s.r===sRoleFilter);
    if(sQ)list=list.filter(s=>s.n.toLowerCase().includes(sQ.toLowerCase()));

    // Group by role
    const groups={packer:[],runner:[],boxmaker:[]};
    list.forEach(s=>{if(groups[s.r])groups[s.r].push(s);});

    const roleCounts={packer:staff.filter(s=>s.r==="packer").length,runner:staff.filter(s=>s.r==="runner").length,boxmaker:staff.filter(s=>s.r==="boxmaker").length};

    let listHtml="";
    const showGroupHeads=sRoleFilter==="all"&&!sQ;
    ROLES.forEach(r=>{
      if(groups[r].length===0)return;
      if(showGroupHeads)listHtml+=`<div class="slist-group-head">${ROLE_EMOJI[r]} ${ROLE_LABELS[r]}s (${groups[r].length})</div>`;
      groups[r].forEach(s=>{
        listHtml+=`<div class="srow" onclick="openEditPerson('${s.n.replace(/'/g,"\\'")}')">
          <div class="srow-av rc-${s.r}">${initials(s.n)}</div>
          <div class="srow-info">
            <div class="srow-name">${s.n}</div>
            <div class="srow-role"><span class="srow-chip rc-${s.r}">${ROLE_LABELS[s.r]}</span></div>
          </div>
          <i class="ti ti-chevron-right srow-arrow"></i>
        </div>`;
      });
    });

    document.getElementById("settings-root").innerHTML=`
    <div class="settings-page">
      <div class="settings-topbar">
        <button class="settings-backbtn" onclick="closeSettings()"><i class="ti ti-chevron-left"></i></button>
        <span class="settings-title">Staff (${staff.length})</span>
        <button class="settings-addbtn" onclick="openAddPerson()"><i class="ti ti-plus" style="font-size:14px"></i> Add</button>
      </div>

      <div class="settings-search">
        <i class="ti ti-search ss-icon"></i>
        <input placeholder="Search staff…" value="${sQ.replace(/"/g,'&quot;')}"
          oninput="sQ=this.value;renderSettings()"
          autocomplete="off" autocorrect="off" autocapitalize="words"/>
      </div>

      <div class="settings-rolefilter">
        <button class="srf-btn${sRoleFilter==='all'?' on-all':''}" onclick="sRoleFilter='all';renderSettings()">All ${staff.length}</button>
        <button class="srf-btn${sRoleFilter==='packer'?' on-packer':''}" onclick="sRoleFilter='packer';renderSettings()">🔵 Packers ${roleCounts.packer}</button>
        <button class="srf-btn${sRoleFilter==='runner'?' on-runner':''}" onclick="sRoleFilter='runner';renderSettings()">⚪️ Runners ${roleCounts.runner}</button>
        <button class="srf-btn${sRoleFilter==='boxmaker'?' on-boxmaker':''}" onclick="sRoleFilter='boxmaker';renderSettings()">🔴 Box makers ${roleCounts.boxmaker}</button>
      </div>

      <div class="settings-list">
        <div class="settings-list-inner">
          ${listHtml||`<div class="empty" style="padding:40px 0"><i class="ti ti-user-search"></i>No staff found</div>`}
        </div>
      </div>
    </div>`;
    return;
  }

  // Edit or Add sheet
  const isAdd=sView==="add";
  const displayName=isAdd?editName:(sEditPerson?.n||"");
  const displayRole=editRole;
  const avClass=displayRole?"rc-"+displayRole:"rc-none";
  const avInitials=displayName?initials(displayName):"?";

  const roleCards=ROLES.map(r=>`
    <button class="role-card${displayRole===r?" sel-"+r:""}" data-role="${r}" onclick="setEditRole('${r}')">
      <div class="role-card-dot rc-${r}"></div>
      <div class="role-card-lbl">${ROLE_LABELS[r]}</div>
    </button>`).join("");

  document.getElementById("settings-root").innerHTML=`
  <div class="settings-page">
    <div class="settings-topbar">
      <button class="settings-backbtn" onclick="sView='list';renderSettings()"><i class="ti ti-chevron-left"></i></button>
      <span class="settings-title">${isAdd?"New employee":"Edit employee"}</span>
      <div style="width:34px"></div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:24px 18px calc(24px + var(--safe-b))">

      <div class="edit-avatar-wrap">
        <div class="edit-av ${avClass}" id="edit-av">${avInitials}</div>
      </div>

      <div class="field-label">Name</div>
      <input class="field-input" id="edit-name-input"
        value="${displayName.replace(/"/g,'&quot;')}"
        placeholder="Full name"
        autocomplete="off" autocorrect="off" autocapitalize="words"
        oninput="editName=this.value;const av=document.getElementById('edit-av');if(av)av.textContent=editName?initials(editName):'?'"/>

      <div class="field-label">Role</div>
      <div class="role-grid">${roleCards}</div>

      <button class="edit-save" onclick="saveEdit()">
        <i class="ti ti-${isAdd?'plus':'check'}" style="font-size:16px"></i>
        ${isAdd?"Add to staff":"Save changes"}
      </button>

      ${!isAdd?`<button class="edit-delete" onclick="deletePerson()">
        <i class="ti ti-trash" style="font-size:16px"></i>Remove from staff
      </button>`:""}
    </div>
  </div>`;

  if(isAdd)setTimeout(()=>document.getElementById("edit-name-input")?.focus(),80);
}

/* ── Daily summary ── */
function buildDailySummary(){
  const date=wdates(wo)[ad];
  const dd=dat[dk(wo,ad)]||{};
  const totalWork=staff.filter(s=>dd[s.n]==="work").length;
  const totalAbsent=staff.filter(s=>dd[s.n]==="absent").length;
  const totalEarly=staff.filter(s=>dd[s.n]==="early").length;
  const totalLeave=staff.filter(s=>dd[s.n]==="leave").length;
  const totalPresent=totalWork+totalEarly;
  const buckets={};
  ROLES.forEach(r=>{buckets[r]={work:[],absent:[],early:[],leave:[]};});
  staff.forEach(s=>{
    const st=dd[s.n]||"";const b=buckets[s.r];
    if(st==="work")b.work.push(s.n);else if(st==="absent")b.absent.push(s.n);
    else if(st==="early")b.early.push(s.n);else if(st==="leave")b.leave.push(s.n);
  });
  const lines=["📋 Shift Summary — "+ffl(date),""];
  lines.push("👥 On floor: "+totalPresent+" / "+staff.length);
  lines.push("✅ At work: "+totalWork);
  if(totalEarly)lines.push("🚪 Left early: "+totalEarly);
  if(totalAbsent)lines.push("❌ Absent: "+totalAbsent);
  if(totalLeave)lines.push("📅 Leave/sick: "+totalLeave);
  lines.push("");
  ROLES.forEach(r=>{
    const b=buckets[r];const total=staff.filter(s=>s.r===r).length;if(!total)return;
    const present=b.work.length+b.early.length;
    lines.push(ROLE_EMOJI[r]+" "+ROLE_LABELS[r]+"s: "+present+" / "+total);
    if(b.absent.length)lines.push("  ❌ Absent: "+b.absent.join(", "));
    if(b.early.length)lines.push("  🚪 Left early: "+b.early.join(", "));
    if(b.leave.length)lines.push("  📅 Leave: "+b.leave.join(", "));
  });
  return lines.join("\n");
}
function shareDailySummary(){
  const text=document.getElementById("drtxt").innerText;
  if(navigator.share){navigator.share({text});return;}
  navigator.clipboard.writeText(text).then(()=>{
    const b=document.getElementById("dcpbtn");
    b.innerHTML='<i class="ti ti-check" style="font-size:16px"></i> Copied!';
    setTimeout(()=>{b.innerHTML='<i class="ti ti-send" style="font-size:16px"></i>Share / Copy';},2000);
  });
}

/* ── Weekly report ── */
function buildReport(){
  const dates=wdates(wo);const lbl=weekLabel();
  const sec={absent:[],early:[],leave:[]};
  DAYS.forEach((_,i)=>{
    const dd=dat[dk(wo,i)]||{};
    staff.forEach(s=>{const st=dd[s.n]||"";if(sec[st])sec[st].push("  • "+s.n+" ("+ROLE_LABELS[s.r]+") — "+ffl(dates[i]));});
  });
  const lines=["Attendance — "+lbl.main+" ("+lbl.sub+")\n"];
  if(sec.absent.length){lines.push("Absent:");sec.absent.forEach(l=>lines.push(l));lines.push("");}
  if(sec.early.length){lines.push("Left early:");sec.early.forEach(l=>lines.push(l));lines.push("");}
  if(sec.leave.length){lines.push("Leave / sick:");sec.leave.forEach(l=>lines.push(l));lines.push("");}
  if(!sec.absent.length&&!sec.early.length&&!sec.leave.length)lines.push("No absences this week.");
  return lines.join("\n");
}
function shareReport(){
  const text=document.getElementById("rtxt").innerText;
  if(navigator.share){navigator.share({text});return;}
  navigator.clipboard.writeText(text).then(()=>{
    const b=document.getElementById("cpbtn");
    b.innerHTML='<i class="ti ti-check" style="font-size:16px"></i> Copied!';
    setTimeout(()=>{b.innerHTML='<i class="ti ti-copy" style="font-size:16px"></i>Copy to clipboard';},2000);
  });
}

/* ── Swipe row to clear ── */
let rowTx=0,rowP=null;
function rts(e,p){rowTx=e.touches[0].clientX;rowP=p;}
function rte(e,p){
  if(rowP!==p)return;
  const dx=e.changedTouches[0].clientX-rowTx;
  if(Math.abs(dx)>72&&gs(p)){
    const k=dk(wo,ad);lastAction={k,p,prev:dat[k][p]||""};dat[k][p]="";hap("medium");save();patchRow(p);updateStats();updateDayPip(ad);showToast("Cleared");
  }
}

/* ── Swipe pages ── */
let tx=0,ty=0;
document.addEventListener("touchstart",e=>{if(!e.target.closest(".row")){tx=e.touches[0].clientX;ty=e.touches[0].clientY;}},{passive:true});
document.addEventListener("touchend",e=>{
  if(view!=="main"||e.target.closest(".row")||e.target.closest(".settings-page"))return;
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>64&&Math.abs(dx)>Math.abs(dy)*1.6)cw(dx<0?1:-1);
},{passive:true});

/* ── Main render ── */
function render(){
  // Remove settings if going back to main
  if(view!=="settings"){
    document.getElementById("settings-root")?.remove();
  }

  const dates=wdates(wo);const lbl=weekLabel();
  const filtered=getFiltered();
  const todaySt=dayStats(ad);
  const canShare=typeof navigator.share!=="undefined";

  if(view==="daily"){
    document.getElementById("root").innerHTML=`
    <div class="overlay" onclick="view='main';render()">
      <div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div class="sheetheader"><span class="sheettitle">End of shift</span><button class="closebtn" onclick="view='main';render()"><i class="ti ti-x"></i></button></div>
        <div class="rt" id="drtxt">${buildDailySummary()}</div>
        <button class="bigbtn primary" id="dcpbtn" onclick="shareDailySummary()"><i class="ti ti-send" style="font-size:16px"></i>Share / Copy</button>
      </div>
    </div>`;return;
  }

  if(view==="report"){
    document.getElementById("root").innerHTML=`
    <div class="overlay" onclick="view='main';render()">
      <div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div class="sheetheader"><span class="sheettitle">Weekly report</span><button class="closebtn" onclick="view='main';render()"><i class="ti ti-x"></i></button></div>
        <div class="rt" id="rtxt">${buildReport()}</div>
        <button class="bigbtn primary" id="cpbtn" onclick="shareReport()"><i class="ti ti-${canShare?"share-2":"copy"}" style="font-size:16px"></i>${canShare?"Share report":"Copy to clipboard"}</button>
      </div>
    </div>`;return;
  }

  if(view==="settings"){
    // Render main behind, then settings on top
    renderMainHTML(dates,lbl,filtered,todaySt);
    renderSettings();
    return;
  }

  renderMainHTML(dates,lbl,filtered,todaySt);
}

function renderMainHTML(dates,lbl,filtered,todaySt){
  const absent=todaySt.absent,early=todaySt.early,leave=todaySt.leave;
  const atWork=staff.length-absent-early-leave;
  const k=dk(wo,ad);const dd=dat[k]||{};
  const allWork=filtered.length>0&&filtered.every(s=>dd[s.n]==="work");

  const dayStrip=DAYS.map((d,i)=>{
    const today=isToday(i);
    const has=Object.values(dat[dk(wo,i)]||{}).some(v=>v);
    const cls=[(ad===i?"active":""),(today?"is-today":"")].filter(Boolean).join(" ");
    return`<button class="daybtn ${cls}" data-day="${i}" onclick="selDay(${i})">
      <span class="dday">${d}</span>
      <span class="dnum">${dates[i].getDate()}</span>
      <span class="${(has&&ad!==i)?"dpip":"dpip-ph"}"></span>
    </button>`;
  }).join("");

  const roleCounts={packer:0,runner:0,boxmaker:0};
  staff.forEach(s=>{if(roleCounts[s.r]!==undefined)roleCounts[s.r]++;});

  const roleTabs=`<div class="roletabs">
    <button class="rtab${roleFilter==="all"?" active-all":""}" onclick="setRoleFilter('all')">
      <span class="rtab-count">${staff.length}</span>
      <span class="rtab-label">All</span>
    </button>
    <button class="rtab${roleFilter==="packer"?" active-packer":""}" onclick="setRoleFilter('packer')">
      <span class="rtab-count">${roleCounts.packer}</span>
      <span class="rtab-label">🔵 Packers</span>
    </button>
    <button class="rtab${roleFilter==="runner"?" active-runner":""}" onclick="setRoleFilter('runner')">
      <span class="rtab-count">${roleCounts.runner}</span>
      <span class="rtab-label">⚪️ Runners</span>
    </button>
    <button class="rtab${roleFilter==="boxmaker"?" active-boxmaker":""}" onclick="setRoleFilter('boxmaker')">
      <span class="rtab-count">${roleCounts.boxmaker}</span>
      <span class="rtab-label">🔴 Box makers</span>
    </button>
  </div>`;

  const none=filtered.filter(s=>!dd[s.n]);
  const marked=filtered.filter(s=>!!dd[s.n]);
  const statusOrder={work:0,absent:1,early:2,leave:3};
  marked.sort((a,b)=>(statusOrder[dd[a.n]]||0)-(statusOrder[dd[b.n]]||0));

  function makeRow(s){
    const st=gs(s.n);
    const ep=s.n.replace(/'/g,"\\'");
    const badge=st?`<span class="badge b-${st}"><i class="ti ${BADGE_ICONS[st]}"></i>${BADGE_LABELS[st]}</span>`:`<span class="badge b-none"></span>`;
    return`<div class="row${st?" s-"+st:""}" data-p="${s.n.replace(/"/g,'&quot;')}" data-role="${s.r}" ontouchstart="rts(event,'${ep}')" ontouchend="rte(event,'${ep}')">
      <div class="row-stripe"></div>
      <div class="avatar">${initials(s.n)}</div>
      <div class="name-col">
        <span class="nm">${s.n}</span>
        <div class="info-row">
          <span class="role-chip rc-${s.r}">${ROLE_LABELS[s.r]}</span>
          ${badge}
        </div>
      </div>
      <div class="sbs">${SI.map(([sk,ic,lb])=>`<button class="sb" data-s="${sk}" aria-label="${lb}" onclick="toggle('${ep}','${sk}')"><i class="ti ${ic}"></i></button>`).join("")}</div>
    </div>`;
  }

  let rowsHtml="";
  if(!filtered.length){
    rowsHtml='<div class="empty"><i class="ti ti-user-search"></i>'+(q?'No one named "'+q+'"':('No '+(ROLE_LABELS[roleFilter]||'staff')+' found'))+'</div>';
  } else {
    if(none.length)rowsHtml+=none.map(makeRow).join("");
    if(marked.length){
      rowsHtml+=`<div class="section-head"><span class="section-label">Marked</span><span class="section-count">${marked.length}</span></div>`;
      rowsHtml+=marked.map(makeRow).join("");
    }
  }

  document.getElementById("root").innerHTML=`<div class="app">
    <div class="topbar">
      <div class="wknav">
        <button class="navarrow" onclick="cw(-1)"><i class="ti ti-chevron-left"></i></button>
        <span class="wklbl" onclick="goToday()">${lbl.main}${lbl.sub?`<span>${lbl.sub}</span>`:""}</span>
        <button class="navarrow" onclick="cw(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="searchwrap">
        <i class="ti ti-search searchicon"></i>
        <input class="searchbox" placeholder="Search…" value="${q.replace(/"/g,'&quot;')}" oninput="q=this.value;render()" autocomplete="off" autocorrect="off" autocapitalize="none"/>
        ${q?`<button class="searchclear" onclick="q='';render()"><i class="ti ti-x"></i></button>`:""}
      </div>
      <button class="actbtn" onclick="view='daily';render()" title="End of shift summary"><i class="ti ti-clipboard-list"></i></button>
      <button class="actbtn" onclick="view='report';render()" title="Weekly report"><i class="ti ti-file-text"></i></button>
      <button class="actbtn" onclick="openSettings()" title="Staff"><i class="ti ti-users"></i></button>
    </div>

    <div class="sticky-head">
      <div class="dayscroll">${dayStrip}</div>
      ${roleTabs}
      <div class="statrow">
        <div class="stat s-w"><div class="stat-ico"><i class="ti ti-check" style="color:var(--c-work)"></i></div><div class="statnum" id="stat-w" style="color:var(--c-work-text)">${atWork}</div><div class="statlbl">At work</div></div>
        <div class="stat s-a"><div class="stat-ico"><i class="ti ti-user-x" style="color:var(--c-absent)"></i></div><div class="statnum" id="stat-a" style="color:var(--c-absent-text)">${absent}</div><div class="statlbl">Absent</div></div>
        <div class="stat s-e"><div class="stat-ico"><i class="ti ti-logout" style="color:var(--c-early)"></i></div><div class="statnum" id="stat-e" style="color:var(--c-early-text)">${early}</div><div class="statlbl">Left early</div></div>
        <div class="stat s-l"><div class="stat-ico"><i class="ti ti-calendar-off" style="color:var(--c-leave)"></i></div><div class="statnum" id="stat-l" style="color:var(--c-leave-text)">${leave}</div><div class="statlbl">Leave</div></div>
      </div>
    </div>

    <div class="qbar">
      <button class="qbtn qall" onclick="markAllWork()"><i class="ti ${allWork?"ti-x":"ti-check"}" style="font-size:13px"></i>${allWork?"Clear all":"All at work"}</button>
      <button class="qbtn qclear" onclick="clearDay()"><i class="ti ti-eraser" style="font-size:13px"></i>Clear day</button>
    </div>

    <div class="rows">${rowsHtml}</div>
  </div>`;
}

load();ad=todayIdx();render();
</script>
</body>
</html>
