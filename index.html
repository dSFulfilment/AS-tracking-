<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Attendance">
<title>Attendance</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
:root{
  --page:#F2F2F7;--card:#FFFFFF;
  --shadow:0 1px 4px rgba(0,0,0,0.08),0 0 0 0.5px rgba(0,0,0,0.06);
  --shadow-sm:0 1px 2px rgba(0,0,0,0.06),0 0 0 0.5px rgba(0,0,0,0.05);
  --text:#1D1D1F;--text2:#6E6E73;--text3:#AEAEB2;
  --fill:#E5E5EA;--fill2:#F2F2F7;
  --accent:#5856D6;--accent-soft:#EEEDFC;--accent-dim:#3634A3;
  --c-work:#34C759;  --c-work-bg:#EAFFF1;   --c-work-soft:#C8EFD4; --c-work-text:#1A6B30;
  --c-absent:#FF3B30;--c-absent-bg:#FFF2F1;  --c-absent-soft:#FFD2CF;--c-absent-text:#B8251C;
  --c-early:#FF9500; --c-early-bg:#FFF8EC;   --c-early-soft:#FFE5B0; --c-early-text:#A05D00;
  --c-leave:#007AFF; --c-leave-bg:#EFF6FF;   --c-leave-soft:#C0D8FF; --c-leave-text:#0A52B8;
  --safe-t:env(safe-area-inset-top);--safe-b:env(safe-area-inset-bottom);
}
@media(prefers-color-scheme:dark){
  :root{
    --page:#000;--card:#1C1C1E;
    --shadow:0 1px 6px rgba(0,0,0,0.5),0 0 0 0.5px rgba(255,255,255,0.07);
    --shadow-sm:0 1px 3px rgba(0,0,0,0.4),0 0 0 0.5px rgba(255,255,255,0.06);
    --text:#FFF;--text2:#AEAEB2;--text3:#636366;
    --fill:#2C2C2E;--fill2:#1C1C1E;
    --accent:#6E6BFF;--accent-soft:#1C1A3C;--accent-dim:#4A48C0;
    --c-work-bg:#0C2416;--c-work-soft:#1E4A2E;--c-work-text:#4CD97A;
    --c-absent-bg:#280D0C;--c-absent-soft:#3C1614;--c-absent-text:#FF6961;
    --c-early-bg:#261700;--c-early-soft:#3A2600;--c-early-text:#FFAC33;
    --c-leave-bg:#0C1828;--c-leave-soft:#142238;--c-leave-text:#4DA8FF;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{min-height:100%;background:var(--page)}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;color:var(--text);overscroll-behavior:none}

.app{max-width:600px;margin:0 auto;padding-top:calc(var(--safe-t)+10px);padding-bottom:calc(28px + var(--safe-b));min-height:100vh}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;gap:8px;padding:0 12px 10px}
.wknav{display:flex;align-items:center;gap:4px}
.navarrow{width:34px;height:34px;border-radius:50%;border:none;background:var(--card);box-shadow:var(--shadow-sm);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;user-select:none}
.navarrow:active{background:var(--fill);transform:scale(0.88)}
.wklbl{font-size:13px;font-weight:700;color:var(--text);min-width:88px;text-align:center;padding:5px 2px;cursor:pointer;border-radius:8px;user-select:none;line-height:1}
.wklbl span{display:block;font-size:10px;font-weight:500;color:var(--text3);margin-top:2px}
.wklbl:active{background:var(--fill)}
.searchwrap{position:relative;flex:1}
.searchbox{width:100%;height:36px;border:none;border-radius:12px;padding:0 28px 0 32px;font-size:16px;background:var(--card);color:var(--text);box-shadow:var(--shadow-sm);-webkit-appearance:none}
.searchbox:focus{outline:none;box-shadow:0 0 0 2px var(--accent)}
.searchicon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.searchclear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--text3);border:none;border-radius:50%;width:16px;height:16px;color:#fff;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.actbtn{width:36px;height:36px;border-radius:12px;border:none;background:var(--card);box-shadow:var(--shadow-sm);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;user-select:none}
.actbtn:active{background:var(--fill);transform:scale(0.9)}

/* ── Sticky header ── */
.sticky-head{position:sticky;top:0;z-index:10;background:var(--page);padding:0 12px 8px}

/* ── Day strip ── */
.dayscroll{display:flex;gap:6px;margin-bottom:8px}
.daybtn{flex:1;height:68px;border:none;border-radius:16px;background:var(--card);box-shadow:var(--shadow-sm);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;user-select:none;position:relative;overflow:hidden}
.daybtn:active{transform:scale(0.91)}
.daybtn.is-today .dnum{color:var(--accent)}
.daybtn.active{background:var(--accent);box-shadow:0 4px 14px rgba(88,86,214,0.4)}
.daybtn.active .dday,.daybtn.active .dpip{color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.5)}
.daybtn.active .dnum{color:#fff}
.dday{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:1px}
.dnum{font-size:24px;font-weight:700;color:var(--text);line-height:1}
.dpip{width:4px;height:4px;border-radius:50%;background:var(--text3);margin-top:4px}
.dpip-ph{width:4px;height:4px;margin-top:4px}

/* ── Stats ── */
.statrow{display:flex;gap:6px}
.stat{flex:1;border-radius:14px;padding:9px 4px 7px;text-align:center;box-shadow:var(--shadow-sm);cursor:pointer;user-select:none}
.stat:active{transform:scale(0.96);opacity:0.8}
.stat-ico{font-size:15px;margin-bottom:2px}
.statnum{font-size:22px;font-weight:800;line-height:1}
.statlbl{font-size:9px;font-weight:600;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}
.stat.s-w{background:var(--c-work-bg)} .stat.s-a{background:var(--c-absent-bg)}
.stat.s-e{background:var(--c-early-bg)} .stat.s-l{background:var(--c-leave-bg)}

/* ── Quick bar ── */
.qbar{display:flex;gap:6px;padding:0 12px;margin-bottom:8px}
.qbtn{flex:1;height:34px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;user-select:none}
.qbtn:active{opacity:0.7;transform:scale(0.96)}
.qbtn.qall{background:var(--c-work-soft);color:var(--c-work-text)}
.qbtn.qclear{background:var(--fill);color:var(--text2)}

/* ── Section headings ── */
.section-head{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px 4px;
}
.section-label{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;
  color:var(--text3);
}
.section-count{
  font-size:11px;font-weight:600;
  background:var(--fill);color:var(--text2);
  border-radius:20px;padding:1px 7px;
}

/* ── Staff rows ── */
.rows{display:flex;flex-direction:column;gap:5px;padding:0 12px}

.row{
  display:flex;align-items:center;
  padding:0 10px 0 12px;
  border-radius:16px;background:var(--card);
  box-shadow:var(--shadow);gap:10px;min-height:58px;
  position:relative;touch-action:pan-y;
  transition:background 0.15s;
}
/* Status backgrounds — more saturated than before */
.row.s-work  {background:var(--c-work-bg)}
.row.s-absent{background:var(--c-absent-bg)}
.row.s-early {background:var(--c-early-bg)}
.row.s-leave {background:var(--c-leave-bg)}

/* Coloured left stripe */
.row-stripe{width:4px;height:100%;position:absolute;left:0;top:0;border-radius:16px 0 0 16px;background:var(--fill)}
.row.s-work   .row-stripe{background:var(--c-work)}
.row.s-absent .row-stripe{background:var(--c-absent)}
.row.s-early  .row-stripe{background:var(--c-early)}
.row.s-leave  .row-stripe{background:var(--c-leave)}

/* Avatar */
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;background:var(--fill2);color:var(--text2)}
.row.s-work   .avatar{background:var(--c-work-soft);color:var(--c-work-text)}
.row.s-absent .avatar{background:var(--c-absent-soft);color:var(--c-absent-text)}
.row.s-early  .avatar{background:var(--c-early-soft);color:var(--c-early-text)}
.row.s-leave  .avatar{background:var(--c-leave-soft);color:var(--c-leave-text)}

/* Name + badge */
.name-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.nm{font-size:15px;font-weight:600;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ★ Big status badge — the key change ★ */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px 2px 6px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:0.2px;
  align-self:flex-start;
}
.badge i{font-size:11px}
.badge.b-work  {background:var(--c-work);   color:#fff}
.badge.b-absent{background:var(--c-absent); color:#fff}
.badge.b-early {background:var(--c-early);  color:#fff}
.badge.b-leave {background:var(--c-leave);  color:#fff}
.badge.b-none  {display:none}

/* Status buttons */
.sbs{display:flex;gap:3px;flex-shrink:0}
.sb{
  width:38px;height:46px;border:none;border-radius:12px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;user-select:none;transition:transform 0.1s;
}
.sb:active{transform:scale(0.76)}
.sb[data-s=work]  {background:var(--c-work-soft);  color:var(--c-work-text)}
.sb[data-s=absent]{background:var(--c-absent-soft);color:var(--c-absent-text)}
.sb[data-s=early] {background:var(--c-early-soft); color:var(--c-early-text)}
.sb[data-s=leave] {background:var(--c-leave-soft); color:var(--c-leave-text)}
/* Active — full colour + glow */
.row.s-work   .sb[data-s=work]  {background:var(--c-work);  color:#fff;box-shadow:0 2px 10px rgba(52,199,89,0.5)}
.row.s-absent .sb[data-s=absent]{background:var(--c-absent);color:#fff;box-shadow:0 2px 10px rgba(255,59,48,0.5)}
.row.s-early  .sb[data-s=early] {background:var(--c-early); color:#fff;box-shadow:0 2px 10px rgba(255,149,0,0.5)}
.row.s-leave  .sb[data-s=leave] {background:var(--c-leave); color:#fff;box-shadow:0 2px 10px rgba(0,122,255,0.5)}

.empty{text-align:center;padding:56px 16px;color:var(--text3);font-size:14px;line-height:1.6}
.empty i{font-size:36px;display:block;margin-bottom:10px;opacity:0.5}

/* ── Toast ── */
.toast{position:fixed;bottom:calc(24px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(90px);background:#1C1C1E;color:#fff;border-radius:16px;padding:12px 18px;display:flex;align-items:center;gap:16px;font-size:14px;font-weight:500;z-index:400;transition:transform 0.28s cubic-bezier(0.34,1.4,0.64,1);white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.45);pointer-events:none;user-select:none}
@media(prefers-color-scheme:dark){.toast{background:#3A3A3C}}
.toast.show{transform:translateX(-50%) translateY(0);pointer-events:auto}
.toast-undo{background:none;border:none;color:#64D2FF;font-size:14px;font-weight:700;cursor:pointer;padding:4px 0}

/* ── Sheet / Overlay ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding-bottom:var(--safe-b)}
.sheet{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:600px;padding:20px 18px calc(20px + var(--safe-b));max-height:90vh;display:flex;flex-direction:column}
.sheet-handle{width:40px;height:4px;background:var(--fill);border-radius:2px;margin:0 auto 18px;flex-shrink:0}
.sheetheader{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-shrink:0}
.sheettitle{font-size:18px;font-weight:700;color:var(--text)}
.closebtn{width:30px;height:30px;border-radius:50%;background:var(--fill);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:13px}
.closebtn:active{background:var(--fill2)}
.rt{font-size:13px;line-height:1.9;color:var(--text);white-space:pre-wrap;background:var(--fill2);padding:14px 16px;border-radius:14px;margin-bottom:12px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;min-height:0}
.bigbtn{width:100%;padding:15px;border:none;border-radius:14px;background:var(--fill2);cursor:pointer;font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;flex-shrink:0}
.bigbtn:last-child{margin-bottom:0}.bigbtn:active{opacity:0.7}
.bigbtn.primary{background:var(--accent);color:#fff}.bigbtn.primary:active{background:var(--accent-dim)}
.addinput{display:flex;gap:8px;margin-bottom:10px;flex-shrink:0}
.addinput input{flex:1;height:48px;border:none;border-radius:14px;padding:0 14px;font-size:16px;background:var(--fill2);color:var(--text);-webkit-appearance:none}
.addinput input:focus{outline:none;box-shadow:0 0 0 2px var(--accent)}
.addconfirm{height:48px;padding:0 18px;border:none;border-radius:14px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;white-space:nowrap}
.addconfirm:active{background:var(--accent-dim)}
.stoolbar{display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-shrink:0}
.stoolbar-count{font-size:13px;color:var(--text2);flex:1;font-weight:500}
.sorttoggle{height:32px;padding:0 12px;border:none;border-radius:10px;background:var(--fill2);cursor:pointer;font-size:12px;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:5px}
.sorttoggle.on{background:var(--accent);color:#fff}.sorttoggle:active{opacity:0.7}
.plist{display:flex;flex-direction:column;gap:4px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;min-height:0}
.prow{display:flex;align-items:center;padding:10px 12px;border-radius:14px;background:var(--fill2);gap:10px;min-height:52px}
.pav{width:34px;height:34px;border-radius:50%;background:var(--fill);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2);flex-shrink:0}
.pnm{flex:1;font-size:14px;font-weight:500;color:var(--text)}
.delbtn{width:38px;height:38px;border-radius:10px;border:none;background:var(--c-absent-soft);color:var(--c-absent-text);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer}
.delbtn:active{opacity:0.6}
</style>
</head>
<body>
<div id="toast" class="toast">
  <span id="toast-msg">Status updated</span>
  <button class="toast-undo" onclick="undoLast()">Undo</button>
</div>
<div id="root"></div>
<script>
const DEFAULT_STAFF=["Agnes Aruba","Aporo Aruba","Avarua","Ben McNicholas","Charli Murphy","Dewi","Emerald","Emmanuel","Emma L","Faataga Fao","Hilary","Hussein Koech","Isabel Albinus","Jasmin Lulio","Jet Crozier","June","Kacu","Kaijanella Robertson","Karen Brown","Koni Latu","Kyla-Le Perry","Marta","Natalia Tuitama","Norhaffezan (Nora)","Paula Leti","Pauline W","Ryan Donald","Saxon","Erina Edmonds","Sinuch Soy","Toanui Moeara","Vikki Rakei"];
const DAYS=["Mon","Tue","Wed","Thu","Fri"];
const SI=[["work","ti-check","At work"],["absent","ti-x","Absent"],["early","ti-logout","Left early"],["leave","ti-calendar-off","Leave/sick"]];
const BADGE_LABELS={work:"At work",absent:"Absent",early:"Left early",leave:"On leave"};
const BADGE_ICONS={work:"ti-check",absent:"ti-x",early:"ti-logout",leave:"ti-calendar-off"};

let staff=[...DEFAULT_STAFF];
let dat={},q="",view="main",sortAZ=false;
let wo=0,ad=0;
let lastAction=null,undoTimer=null;

function hap(s="light"){try{if(navigator.vibrate)navigator.vibrate(s==="light"?10:20);}catch(e){}}

function save(){try{localStorage.setItem("att4_dat",JSON.stringify(dat));localStorage.setItem("att4_staff",JSON.stringify(staff));localStorage.setItem("att4_prefs",JSON.stringify({sortAZ}));}catch(e){}}
function load(){try{const d=localStorage.getItem("att4_dat"),s=localStorage.getItem("att4_staff"),p=localStorage.getItem("att4_prefs");if(d)dat=JSON.parse(d);if(s)staff=JSON.parse(s);if(p){const pp=JSON.parse(p);sortAZ=pp.sortAZ||false;}}catch(e){}}

function mon(o){const d=new Date(),dy=d.getDay();d.setDate(d.getDate()-(dy===0?6:dy-1)+o*7);d.setHours(0,0,0,0);return d;}
function wdates(o){const m=mon(o);return Array.from({length:5},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d;});}
function fd(d){return d.toLocaleDateString("en-AU",{day:"numeric",month:"short"});}
function ffl(d){return d.toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"});}
function dk(w,d){return"w"+w+"d"+d;}
function gs(p){return((dat[dk(wo,ad)]||{})[p])||"";}
function todayIdx(){const dy=new Date().getDay();if(dy===0||dy===6)return 4;return dy-1;}
function isToday(i){if(wo!==0)return false;const dy=new Date().getDay();if(dy===0||dy===6)return false;return(dy-1)===i;}
function weekLabel(){const d=wdates(wo);const r=fd(d[0])+" – "+fd(d[4]);if(wo===0)return{main:"This week",sub:r};if(wo===-1)return{main:"Last week",sub:r};if(wo===1)return{main:"Next week",sub:r};return{main:r,sub:""};}
function initials(n){return n.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();}
function dayStats(i){const dd=dat[dk(wo,i)]||{};let absent=0,early=0,leave=0;staff.forEach(p=>{const s=dd[p]||"";if(s==="absent")absent++;else if(s==="early")early++;else if(s==="leave")leave++;});return{absent,early,leave};}

/* ── Actions ── */
function toggle(p,s){
  const k=dk(wo,ad);
  if(!dat[k])dat[k]={};
  lastAction={k,p,prev:dat[k][p]||""};
  const nv=dat[k][p]===s?"":s;
  dat[k][p]=nv;
  hap("light");save();
  patchRow(p);updateStats();updateDayPip(ad);
  showToast(nv?BADGE_LABELS[nv]+" ✓":"Cleared");
}
function markAllWork(){
  const k=dk(wo,ad);if(!dat[k])dat[k]={};
  const disp=sortAZ?[...staff].sort((a,b)=>a.localeCompare(b)):staff;
  const filt=q?disp.filter(p=>p.toLowerCase().includes(q.toLowerCase())):disp;
  const all=filt.every(p=>dat[k][p]==="work");
  filt.forEach(p=>{dat[k][p]=all?"":"work";});
  hap("medium");save();render();showToast(all?"Cleared all":"All marked at work");
}
function clearDay(){const k=dk(wo,ad);dat[k]={};hap("medium");save();render();showToast("Day cleared");}
function cw(dir){wo+=dir;hap("light");render();}
function goToday(){wo=0;ad=todayIdx();q="";render();}
function selDay(i){ad=i;hap("light");render();}

/* ── DOM patchers ── */
function patchRow(p){
  const el=document.querySelector(`.row[data-p="${CSS.escape(p)}"]`);
  if(!el)return;
  const st=gs(p);
  el.className="row"+(st?" s-"+st:"");
  // patch badge
  const badge=el.querySelector(".badge");
  if(badge){
    badge.className="badge"+(st?" b-"+st:" b-none");
    if(st){badge.innerHTML=`<i class="ti ${BADGE_ICONS[st]}"></i>${BADGE_LABELS[st]}`;}
    else{badge.innerHTML="";}
  }
  // patch avatar
  const av=el.querySelector(".avatar");
  if(av)av.className="avatar";
}
function updateStats(){
  const s=dayStats(ad);
  const w=staff.length-s.absent-s.early-s.leave;
  const ids=["stat-w","stat-a","stat-e","stat-l"];
  const vals=[w,s.absent,s.early,s.leave];
  ids.forEach((id,i)=>{const el=document.getElementById(id);if(el)el.textContent=vals[i];});
}
function updateDayPip(i){
  const has=Object.values(dat[dk(wo,i)]||{}).some(v=>v);
  const btn=document.querySelector(`.daybtn[data-day="${i}"]`);
  if(!btn)return;
  let pip=btn.querySelector(".dpip"),ph=btn.querySelector(".dpip-ph");
  if(has&&i!==ad){if(!pip&&ph){ph.className="dpip";}}
  else{if(pip&&i!==ad){pip.className="dpip-ph";}}
}

/* ── Toast ── */
function showToast(msg="Updated"){
  const t=document.getElementById("toast"),m=document.getElementById("toast-msg");
  if(m&&msg)m.textContent=msg;
  t&&t.classList.add("show");
  clearTimeout(undoTimer);undoTimer=setTimeout(hideToast,3000);
}
function hideToast(){document.getElementById("toast")?.classList.remove("show");clearTimeout(undoTimer);}
function undoLast(){
  if(!lastAction)return;
  const{k,p,prev}=lastAction;
  if(!dat[k])dat[k]={};
  dat[k][p]=prev;lastAction=null;hap("light");save();hideToast();render();
}

/* ── Staff ── */
function delPerson(p){if(!confirm("Remove "+p+"?"))return;staff=staff.filter(x=>x!==p);save();render();}
function addPerson(){const inp=document.getElementById("newinput");const n=inp.value.trim();if(!n||staff.includes(n)){inp.value="";return;}staff.push(n);inp.value="";save();render();setTimeout(()=>document.getElementById("newinput")?.focus(),60);}

/* ── Report ── */
function buildReport(){
  const dates=wdates(wo);const lbl=weekLabel();
  const sec={absent:[],early:[],leave:[]};
  DAYS.forEach((_,i)=>{const dd=dat[dk(wo,i)]||{};staff.forEach(p=>{const st=dd[p]||"";if(sec[st])sec[st].push("  • "+p+" — "+ffl(dates[i]));});});
  const lines=["Attendance — "+lbl.main+" ("+lbl.sub+")\n"];
  if(sec.absent.length){lines.push("Absent:");sec.absent.forEach(l=>lines.push(l));lines.push("");}
  if(sec.early.length){lines.push("Left early:");sec.early.forEach(l=>lines.push(l));lines.push("");}
  if(sec.leave.length){lines.push("Leave / sick:");sec.leave.forEach(l=>lines.push(l));lines.push("");}
  if(!sec.absent.length&&!sec.early.length&&!sec.leave.length)lines.push("No absences recorded this week.");
  return lines.join("\n");
}
function shareReport(){
  const text=document.getElementById("rtxt").innerText;
  if(navigator.share){navigator.share({text});return;}
  navigator.clipboard.writeText(text).then(()=>{
    const b=document.getElementById("cpbtn");
    b.innerHTML='<i class="ti ti-check" style="font-size:16px"></i> Copied!';
    setTimeout(()=>{b.innerHTML='<i class="ti ti-copy" style="font-size:16px"></i> Copy to clipboard';},2000);
  });
}

/* ── Swipe rows to clear ── */
let rowTx=0,rowP=null;
function rts(e,p){rowTx=e.touches[0].clientX;rowP=p;}
function rte(e,p){
  if(rowP!==p)return;
  const dx=e.changedTouches[0].clientX-rowTx;
  if(Math.abs(dx)>72&&gs(p)){
    const k=dk(wo,ad);lastAction={k,p,prev:dat[k][p]||""};dat[k][p]="";hap("medium");save();patchRow(p);updateStats();updateDayPip(ad);showToast("Cleared");
  }
}

/* ── Swipe pages ── */
let tx=0,ty=0;
document.addEventListener("touchstart",e=>{if(!e.target.closest(".row")){tx=e.touches[0].clientX;ty=e.touches[0].clientY;}},{passive:true});
document.addEventListener("touchend",e=>{if(view!=="main"||e.target.closest(".row"))return;const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>64&&Math.abs(dx)>Math.abs(dy)*1.6)cw(dx<0?1:-1);},{passive:true});

/* ── Render ── */
function render(){
  const dates=wdates(wo);const lbl=weekLabel();
  const disp=sortAZ?[...staff].sort((a,b)=>a.localeCompare(b)):staff;
  const filtered=q?disp.filter(p=>p.toLowerCase().includes(q.toLowerCase())):disp;
  const todaySt=dayStats(ad);
  const canShare=typeof navigator.share!=="undefined";

  /* Report */
  if(view==="report"){
    document.getElementById("root").innerHTML=`
    <div class="overlay" onclick="view='main';render()">
      <div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div class="sheetheader"><span class="sheettitle">Weekly report</span><button class="closebtn" onclick="view='main';render()"><i class="ti ti-x"></i></button></div>
        <div class="rt" id="rtxt">${buildReport()}</div>
        <button class="bigbtn primary" id="cpbtn" onclick="shareReport()"><i class="ti ti-${canShare?'share-2':'copy'}" style="font-size:16px"></i>${canShare?"Share report":"Copy to clipboard"}</button>
      </div>
    </div>`;return;
  }

  /* Settings */
  if(view==="settings"){
    const listHtml=staff.map(p=>`<div class="prow"><div class="pav">${initials(p)}</div><span class="pnm">${p}</span><button class="delbtn" onclick="delPerson('${p.replace(/'/g,"\\'")}')"><i class="ti ti-trash"></i></button></div>`).join("");
    document.getElementById("root").innerHTML=`
    <div class="overlay" onclick="view='main';render()">
      <div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div class="sheetheader"><span class="sheettitle">Manage staff</span><button class="closebtn" onclick="view='main';render()"><i class="ti ti-x"></i></button></div>
        <div class="addinput"><input id="newinput" placeholder="Add name…" onkeydown="if(event.key==='Enter')addPerson()" autocomplete="off" autocorrect="off"/><button class="addconfirm" onclick="addPerson()">Add</button></div>
        <div class="stoolbar"><span class="stoolbar-count">${staff.length} people</span><button class="sorttoggle${sortAZ?" on":""}" onclick="sortAZ=!sortAZ;save();render()"><i class="ti ti-sort-ascending" style="font-size:12px"></i> A–Z</button></div>
        <div class="plist">${listHtml}</div>
      </div>
    </div>`;
    setTimeout(()=>document.getElementById("newinput")?.focus(),60);return;
  }

  /* Main */
  const absent=todaySt.absent,early=todaySt.early,leave=todaySt.leave;
  const atWork=staff.length-absent-early-leave;
  const k=dk(wo,ad);const dd=dat[k]||{};
  const allWork=filtered.length>0&&filtered.every(p=>dd[p]==="work");

  const dayStrip=DAYS.map((d,i)=>{
    const today=isToday(i);
    const has=Object.values(dat[dk(wo,i)]||{}).some(v=>v);
    const cls=[(ad===i?"active":""),(today?"is-today":"")].filter(Boolean).join(" ");
    const showPip=has&&ad!==i;
    return`<button class="daybtn ${cls}" data-day="${i}" onclick="selDay(${i})">
      <span class="dday">${d}</span>
      <span class="dnum">${dates[i].getDate()}</span>
      <span class="${showPip?"dpip":"dpip-ph"}"></span>
    </button>`;
  }).join("");

  /* Group rows: unmarked first, then by status */
  const none=filtered.filter(p=>!dd[p]);
  const marked=filtered.filter(p=>!!dd[p]);
  // Sort marked by status order
  const statusOrder={work:0,absent:1,early:2,leave:3};
  marked.sort((a,b)=>(statusOrder[dd[a]]||0)-(statusOrder[dd[b]]||0));

  function makeRow(p){
    const st=gs(p);
    const ep=p.replace(/'/g,"\\'");
    const badge=st?`<span class="badge b-${st}"><i class="ti ${BADGE_ICONS[st]}"></i>${BADGE_LABELS[st]}</span>`:`<span class="badge b-none"></span>`;
    return`<div class="row${st?" s-"+st:""}" data-p="${p.replace(/"/g,'&quot;')}" ontouchstart="rts(event,'${ep}')" ontouchend="rte(event,'${ep}')">
      <div class="row-stripe"></div>
      <div class="avatar">${initials(p)}</div>
      <div class="name-col">
        <span class="nm">${p}</span>
        ${badge}
      </div>
      <div class="sbs">${SI.map(([sk,ic,lb])=>`<button class="sb" data-s="${sk}" aria-label="${lb}" onclick="toggle('${ep}','${sk}')"><i class="ti ${ic}"></i></button>`).join("")}</div>
    </div>`;
  }

  let rowsHtml="";
  if(!filtered.length){
    rowsHtml=`<div class="empty"><i class="ti ti-user-search"></i>No one named "${q}"</div>`;
  } else {
    // Show unmarked group, then marked group with section heading
    if(none.length) rowsHtml+=none.map(makeRow).join("");
    if(marked.length){
      rowsHtml+=`<div class="section-head"><span class="section-label">Marked</span><span class="section-count">${marked.length}</span></div>`;
      rowsHtml+=marked.map(makeRow).join("");
    }
  }

  document.getElementById("root").innerHTML=`<div class="app">
    <div class="topbar">
      <div class="wknav">
        <button class="navarrow" onclick="cw(-1)"><i class="ti ti-chevron-left"></i></button>
        <span class="wklbl" onclick="goToday()">${lbl.main}${lbl.sub?`<span>${lbl.sub}</span>`:""}</span>
        <button class="navarrow" onclick="cw(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="searchwrap">
        <i class="ti ti-search searchicon"></i>
        <input class="searchbox" placeholder="Search…" value="${q.replace(/"/g,'&quot;')}" oninput="q=this.value;render()" autocomplete="off" autocorrect="off" autocapitalize="none"/>
        ${q?`<button class="searchclear" onclick="q='';render()"><i class="ti ti-x"></i></button>`:""}
      </div>
      <button class="actbtn" onclick="view='report';render()" aria-label="Report"><i class="ti ti-file-text"></i></button>
      <button class="actbtn" onclick="view='settings';render()" aria-label="Settings"><i class="ti ti-settings"></i></button>
    </div>

    <div class="sticky-head">
      <div class="dayscroll">${dayStrip}</div>
      <div class="statrow">
        <div class="stat s-w"><div class="stat-ico"><i class="ti ti-check" style="color:var(--c-work)"></i></div><div class="statnum" id="stat-w" style="color:var(--c-work-text)">${atWork}</div><div class="statlbl">At work</div></div>
        <div class="stat s-a"><div class="stat-ico"><i class="ti ti-user-x" style="color:var(--c-absent)"></i></div><div class="statnum" id="stat-a" style="color:var(--c-absent-text)">${absent}</div><div class="statlbl">Absent</div></div>
        <div class="stat s-e"><div class="stat-ico"><i class="ti ti-logout" style="color:var(--c-early)"></i></div><div class="statnum" id="stat-e" style="color:var(--c-early-text)">${early}</div><div class="statlbl">Left early</div></div>
        <div class="stat s-l"><div class="stat-ico"><i class="ti ti-calendar-off" style="color:var(--c-leave)"></i></div><div class="statnum" id="stat-l" style="color:var(--c-leave-text)">${leave}</div><div class="statlbl">Leave</div></div>
      </div>
    </div>

    <div class="qbar">
      <button class="qbtn qall" onclick="markAllWork()"><i class="ti ${allWork?"ti-x":"ti-check"}" style="font-size:13px"></i>${allWork?"Clear all":"All at work"}</button>
      <button class="qbtn qclear" onclick="clearDay()"><i class="ti ti-eraser" style="font-size:13px"></i>Clear day</button>
    </div>

    <div class="rows">${rowsHtml}</div>
  </div>`;
}

load();ad=todayIdx();render();
</script>
</body>
</html>
