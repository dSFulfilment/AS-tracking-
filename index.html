<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Attendance">
<title>Attendance</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
/* ─── Tokens ─────────────────────────────────────────────── */
:root{
  --bg:#F2F2F7; --card:#FFF; --card2:#F2F2F7;
  --shadow:0 1px 4px rgba(0,0,0,.08),0 0 0 .5px rgba(0,0,0,.06);
  --shadow-sm:0 1px 2px rgba(0,0,0,.06),0 0 0 .5px rgba(0,0,0,.05);
  --t1:#1D1D1F; --t2:#6E6E73; --t3:#AEAEB2;
  --fill:#E5E5EA; --fill2:#F2F2F7;
  --accent:#5856D6; --accent2:#3634A3;
  --green:#34C759; --green-bg:#EAFFF1; --green-soft:#C8EFD4; --green-t:#1A6B30;
  --red:#FF3B30;   --red-bg:#FFF2F1;   --red-soft:#FFD2CF;   --red-t:#B8251C;
  --orange:#FF9500;--orange-bg:#FFF8EC;--orange-soft:#FFE5B0;--orange-t:#A05D00;
  --blue:#007AFF;  --blue-bg:#EFF6FF;  --blue-soft:#C0D8FF;  --blue-t:#0A52B8;
  --rp:#0A84FF; --rp-soft:#C0D8FF;
  --rr:#636366; --rr-soft:#E5E5EA;
  --rb:#FF453A; --rb-soft:#FFD2CF;
  --st:env(safe-area-inset-top); --sb:env(safe-area-inset-bottom);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#000; --card:#1C1C1E; --card2:#2C2C2E;
  --shadow:0 1px 6px rgba(0,0,0,.5),0 0 0 .5px rgba(255,255,255,.07);
  --shadow-sm:0 1px 3px rgba(0,0,0,.4),0 0 0 .5px rgba(255,255,255,.06);
  --t1:#FFF; --t2:#AEAEB2; --t3:#636366;
  --fill:#2C2C2E; --fill2:#1C1C1E;
  --accent:#6E6BFF; --accent2:#4A48C0;
  --green-bg:#0C2416; --green-soft:#1E4A2E; --green-t:#4CD97A;
  --red-bg:#280D0C;   --red-soft:#3C1614;   --red-t:#FF6961;
  --orange-bg:#261700;--orange-soft:#3A2600;--orange-t:#FFAC33;
  --blue-bg:#0C1828;  --blue-soft:#142238;  --blue-t:#4DA8FF;
  --rp-soft:#142238; --rr-soft:#3A3A3C; --rb-soft:#3C1614;
}}

/* ─── Reset ─────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{min-height:100%;background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;color:var(--t1);overscroll-behavior:none}

/* ─── Layout ─────────────────────────────────────────────── */
#root{max-width:600px;margin:0 auto}
.app{padding-top:calc(var(--st) + 10px);padding-bottom:calc(32px + var(--sb))}

/* ─── Topbar ─────────────────────────────────────────────── */
.topbar{display:flex;align-items:center;gap:7px;padding:0 12px 10px}
.wknav{display:flex;align-items:center;gap:3px;flex-shrink:0}
.nav-arrow{width:32px;height:32px;border-radius:50%;border:none;background:var(--card);box-shadow:var(--shadow-sm);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;user-select:none}
.nav-arrow:active{background:var(--fill);transform:scale(.87)}
.wklbl{font-size:12px;font-weight:700;color:var(--t1);min-width:82px;text-align:center;padding:4px 2px;cursor:pointer;border-radius:8px;user-select:none;line-height:1.2}
.wklbl small{display:block;font-size:9px;font-weight:500;color:var(--t3);margin-top:1px}
.wklbl:active{background:var(--fill)}
.search-wrap{position:relative;flex:1;min-width:0}
.search-input{width:100%;height:34px;border:none;border-radius:11px;padding:0 26px 0 30px;font-size:16px;background:var(--card);color:var(--t1);box-shadow:var(--shadow-sm);-webkit-appearance:none}
.search-input:focus{outline:none;box-shadow:0 0 0 2px var(--accent)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;pointer-events:none}
.search-x{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:var(--t3);border:none;border-radius:50%;width:15px;height:15px;color:#fff;font-size:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.icon-btn{width:34px;height:34px;border-radius:11px;border:none;background:var(--card);box-shadow:var(--shadow-sm);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;user-select:none}
.icon-btn:active{background:var(--fill);transform:scale(.9)}

/* ─── Sync bar ───────────────────────────────────────────── */
.sync-bar{display:flex;align-items:center;gap:7px;padding:0 14px 6px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--t3);flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:var(--green)}
.sync-dot.err{background:var(--red)}
.sync-dot.busy{background:var(--orange);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.sync-lbl{font-size:11px;color:var(--t3);flex:1;line-height:1}
.sync-action{height:22px;padding:0 9px;border:none;border-radius:7px;background:var(--fill);color:var(--t2);font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap}
.sync-action:active{opacity:.7}
.sync-action.primary{background:var(--accent);color:#fff}

/* ─── Sticky strip ───────────────────────────────────────── */
.sticky{position:sticky;top:0;z-index:10;background:var(--bg);padding:0 12px 8px}

/* ─── Day strip ─────────────────────────────────────────── */
.days{display:flex;gap:5px;margin-bottom:8px}
.day-btn{flex:1;height:66px;border:none;border-radius:15px;background:var(--card);box-shadow:var(--shadow-sm);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;user-select:none;position:relative}
.day-btn:active{transform:scale(.91)}
.day-btn.today .d-num{color:var(--accent)}
.day-btn.sel{background:var(--accent);box-shadow:0 4px 14px rgba(88,86,214,.4)}
.day-btn.sel .d-lbl{color:rgba(255,255,255,.75)}
.day-btn.sel .d-num{color:#fff}
.day-btn.sel .d-pip{background:rgba(255,255,255,.6)}
.d-lbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.d-num{font-size:23px;font-weight:800;color:var(--t1);line-height:1}
.d-pip{width:4px;height:4px;border-radius:50%;background:var(--accent);margin-top:3px}
.d-ph{width:4px;height:4px;margin-top:3px}

/* ─── Role tabs ─────────────────────────────────────────── */
.role-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.role-tab{
  height:56px;border:none;border-radius:14px;cursor:pointer;user-select:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  background:var(--card);box-shadow:var(--shadow-sm);
  transition:transform .1s;
}
.role-tab:active{transform:scale(.93)}
.role-tab .rt-num{font-size:20px;font-weight:800;color:var(--t1);line-height:1}
.role-tab .rt-lbl{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.2px;text-align:center;line-height:1.2}
.role-tab.on-all    {background:var(--accent);box-shadow:0 3px 12px rgba(88,86,214,.35)}
.role-tab.on-packer {background:var(--rp);    box-shadow:0 3px 12px rgba(10,132,255,.35)}
.role-tab.on-runner {background:var(--rr);    box-shadow:0 3px 12px rgba(99,99,102,.3)}
.role-tab.on-boxmaker{background:var(--rb);   box-shadow:0 3px 12px rgba(255,69,58,.35)}
.role-tab.on-all .rt-num,.role-tab.on-all .rt-lbl,
.role-tab.on-packer .rt-num,.role-tab.on-packer .rt-lbl,
.role-tab.on-runner .rt-num,.role-tab.on-runner .rt-lbl,
.role-tab.on-boxmaker .rt-num,.role-tab.on-boxmaker .rt-lbl{color:#fff}

/* ─── Stats row ─────────────────────────────────────────── */
.stats{display:flex;gap:6px}
.stat{flex:1;border-radius:13px;padding:8px 4px 6px;text-align:center;box-shadow:var(--shadow-sm);user-select:none;cursor:pointer}
.stat:active{transform:scale(.95);opacity:.8}
.stat-ico{font-size:14px;margin-bottom:2px}
.stat-num{font-size:21px;font-weight:800;line-height:1}
.stat-lbl{font-size:9px;font-weight:700;color:var(--t3);margin-top:1px;text-transform:uppercase;letter-spacing:.5px}
.stat.sw{background:var(--green-bg)} .stat.sa{background:var(--red-bg)}
.stat.se{background:var(--orange-bg)}.stat.sl{background:var(--blue-bg)}

/* ─── Quick bar ─────────────────────────────────────────── */
.qbar{display:flex;gap:6px;padding:0 12px;margin-bottom:8px}
.qbtn{flex:1;height:34px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;user-select:none}
.qbtn:active{opacity:.7;transform:scale(.96)}
.qbtn.qa{background:var(--green-soft);color:var(--green-t)}
.qbtn.qc{background:var(--fill);color:var(--t2)}

/* ─── Section head ───────────────────────────────────────── */
.sec-head{display:flex;align-items:center;gap:8px;padding:12px 4px 5px}
.sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3)}
.sec-cnt{font-size:11px;font-weight:600;background:var(--fill);color:var(--t2);border-radius:20px;padding:1px 8px}

/* ─── Staff rows ─────────────────────────────────────────── */
.rows{display:flex;flex-direction:column;gap:0;padding:0 12px}

/* Divider between rows */
.rows>.row+.row{border-top:1px solid var(--fill2)}
.rows>.row:first-child{border-radius:16px 16px 0 0}
.rows>.row:last-child{border-radius:0 0 16px 16px;border-top:1px solid var(--fill2)}
.rows>.row:only-child{border-radius:16px}
/* When sec-head appears between groups, reset rounding */
.rows>.sec-head+.row{border-radius:0;border-top:none}
.rows>.sec-head+.row:last-child{border-radius:0 0 16px 16px}

.row{
  display:flex;align-items:center;
  padding:12px 8px 12px 0;
  background:var(--card);
  gap:0;min-height:64px;position:relative;touch-action:pan-y;
  box-shadow:none;
}
/* First row in a group gets top shadow */
.rows>.row:first-child,.rows>.sec-head+.row{
  box-shadow:0 -1px 0 0 var(--fill2);
}
/* Whole list card shadow */
.rows{
  border-radius:16px;
  box-shadow:var(--shadow);
  overflow:hidden;
}

/* Status left bar — bold 5px, full height */
.stripe{
  width:5px;min-width:5px;align-self:stretch;
  margin-right:12px;flex-shrink:0;
  background:var(--fill2);
}
.row[data-r=packer]   .stripe{background:var(--fill2)}
.row[data-r=runner]   .stripe{background:var(--fill2)}
.row[data-r=boxmaker] .stripe{background:var(--fill2)}
.row.sw .stripe{background:var(--green)}
.row.sa .stripe{background:var(--red)}
.row.se .stripe{background:var(--orange)}
.row.sl .stripe{background:var(--blue)}

/* Subtle tint on marked rows */
.row.sw{background:var(--green-bg)}
.row.sa{background:var(--red-bg)}
.row.se{background:var(--orange-bg)}
.row.sl{background:var(--blue-bg)}

/* Name col */
.name-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.nm{font-size:15px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;letter-spacing:-.1px}
.chips{display:flex;gap:5px;align-items:center;flex-wrap:wrap}

/* Role chip — subtle, small */
.rc{display:inline-flex;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600;letter-spacing:.1px}
.rc.rp{background:var(--rp-soft);color:var(--rp)}
.rc.rr{background:var(--rr-soft);color:var(--rr)}
.rc.rb{background:var(--rb-soft);color:var(--rb)}

/* Status badge — solid, high contrast, easy to read */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px 4px 8px;border-radius:7px;
  font-size:12px;font-weight:800;letter-spacing:.2px;
  line-height:1;
}
.badge i{font-size:11px;opacity:.9}
.badge.bw{background:var(--green); color:#fff}
.badge.ba{background:var(--red);   color:#fff}
.badge.be{background:var(--orange);color:#fff}
.badge.bl{background:var(--blue);  color:#fff}
.badge.bn{display:none}

/* Status buttons — icon only, compact, right-aligned */
.sbs{display:flex;gap:2px;flex-shrink:0;padding-right:4px}
.sb{
  width:34px;height:52px;border:none;border-radius:0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;user-select:none;background:transparent;
  color:var(--t3);transition:color .1s;
  border-left:1px solid var(--fill2);
}
.sb:first-child{border-left:none}
.sb:active{transform:scale(.8)}
.sb:hover{color:var(--t1)}
/* Active status button — colour + background highlight */
.row.sw .sb[data-s=work]  {color:var(--green); background:var(--green-soft)}
.row.sa .sb[data-s=absent]{color:var(--red);   background:var(--red-soft)}
.row.se .sb[data-s=early] {color:var(--orange);background:var(--orange-soft)}
.row.sl .sb[data-s=leave] {color:var(--blue);  background:var(--blue-soft)}

/* Empty */
.empty{text-align:center;padding:56px 16px;color:var(--t3);font-size:14px;line-height:1.6}
.empty i{font-size:36px;display:block;margin-bottom:10px;opacity:.4}

/* ─── Toast ─────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:calc(20px + var(--sb));left:50%;
  transform:translateX(-50%) translateY(80px);
  background:#1C1C1E;color:#fff;border-radius:16px;
  padding:11px 16px;display:flex;align-items:center;gap:14px;
  font-size:13px;font-weight:500;z-index:400;
  transition:transform .26s cubic-bezier(.34,1.4,.64,1);
  white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.45);
  pointer-events:none;user-select:none;
}
@media(prefers-color-scheme:dark){.toast{background:#3A3A3C}}
.toast.show{transform:translateX(-50%) translateY(0);pointer-events:auto}
.toast-undo{background:none;border:none;color:#64D2FF;font-size:13px;font-weight:700;cursor:pointer;padding:3px 0}

/* ─── Bottom sheet ───────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.sheet{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:600px;padding:18px 18px calc(20px + var(--sb));max-height:92vh;display:flex;flex-direction:column}
.handle{width:38px;height:4px;background:var(--fill);border-radius:2px;margin:0 auto 16px;flex-shrink:0}
.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-shrink:0}
.sheet-title{font-size:17px;font-weight:700}
.close-btn{width:28px;height:28px;border-radius:50%;background:var(--fill);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:12px}
.close-btn:active{opacity:.7}
.report-txt{font-size:13px;line-height:1.9;white-space:pre-wrap;background:var(--fill2);padding:13px 15px;border-radius:13px;margin-bottom:12px;overflow-y:auto;flex:1;min-height:0;color:var(--t1)}
.sheet-btn{width:100%;padding:14px;border:none;border-radius:13px;background:var(--fill2);cursor:pointer;font-size:15px;font-weight:600;color:var(--t1);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;flex-shrink:0}
.sheet-btn:last-child{margin-bottom:0}.sheet-btn:active{opacity:.7}
.sheet-btn.primary{background:var(--accent);color:#fff}.sheet-btn.primary:active{background:var(--accent2)}
.sheet-btn.danger{background:var(--red-bg);color:var(--red-t)}

/* ─── Settings page ──────────────────────────────────────── */
.sp{
  position:fixed;inset:0;background:var(--bg);z-index:200;
  display:flex;flex-direction:column;
  width:100%;max-width:600px;
  left:50%;transform:translateX(-50%);
  height:100vh;height:100dvh;
  overflow:hidden;
}
.sp-top{
  display:flex;align-items:center;gap:10px;
  padding:calc(var(--st) + 12px) 14px 12px;
  background:var(--card);
  box-shadow:0 .5px 0 rgba(0,0,0,.12);
  flex-shrink:0;min-height:0;
}
.sp-back{height:32px;padding:0 4px;border:none;background:none;color:var(--accent);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.sp-back span{font-size:14px;font-weight:600}
.sp-title{flex:1;font-size:16px;font-weight:700}
.sp-add{height:32px;padding:0 13px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px}
.sp-add:active{background:var(--accent2)}
.ep-save-top{height:32px;padding:0 14px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
.ep-save-top:active{background:var(--accent2)}
.sp-footer-btn{height:32px;padding:0 12px;border:none;border-radius:10px;background:var(--fill2);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.sp-footer-btn:active{opacity:.7}
.sp-footer-btn.danger{background:var(--red-bg);color:var(--red-t)}
/* Search + filter */
.sp-search{padding:8px 14px;position:relative;flex-shrink:0}
.sp-search input{width:100%;height:34px;border:none;border-radius:11px;padding:0 12px 0 34px;font-size:16px;background:var(--fill2);color:var(--t1);-webkit-appearance:none}
.sp-search input:focus{outline:none;box-shadow:0 0 0 2px var(--accent)}
.sp-si{position:absolute;left:24px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;pointer-events:none}
.sp-filter{display:flex;gap:5px;padding:0 14px 8px;overflow-x:auto;flex-shrink:0}
.sp-filter::-webkit-scrollbar{display:none}
.sf{height:27px;padding:0 11px;border:none;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;background:var(--fill2);color:var(--t2);flex-shrink:0}
.sf:active{opacity:.7}
.sf.on-all{background:var(--accent);color:#fff}
.sf.on-packer{background:var(--rp);color:#fff}
.sf.on-runner{background:var(--rr);color:#fff}
.sf.on-boxmaker{background:var(--rb);color:#fff}
/* Staff list */
.sp-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 14px 20px;min-height:0}
.sp-group-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);padding:12px 2px 5px}
.srow{display:flex;align-items:center;gap:11px;background:var(--card);border-radius:15px;padding:11px 13px;cursor:pointer;box-shadow:var(--shadow-sm);margin-bottom:4px;user-select:none}
.srow:active{opacity:.75;transform:scale(.99)}
.srow-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.srow-av.rp{background:var(--rp-soft);color:var(--rp)}
.srow-av.rr{background:var(--rr-soft);color:var(--rr)}
.srow-av.rb{background:var(--rb-soft);color:var(--rb)}
.srow-info{flex:1;min-width:0}
.srow-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srow-chip{display:inline-block;font-size:10px;font-weight:700;border-radius:20px;padding:1px 7px;margin-top:2px}
.srow-chip.rp{background:var(--rp-soft);color:var(--rp)}
.srow-chip.rr{background:var(--rr-soft);color:var(--rr)}
.srow-chip.rb{background:var(--rb-soft);color:var(--rb)}
.srow-arr{color:var(--t3);font-size:13px}

/* ─── Edit page ──────────────────────────────────────────── */
.ep-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px calc(32px + var(--sb));min-height:0}
.ep-av-wrap{display:flex;justify-content:center;margin-bottom:20px}
.ep-av{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800}
.ep-av.rp{background:var(--rp-soft);color:var(--rp)}
.ep-av.rr{background:var(--rr-soft);color:var(--rr)}
.ep-av.rb{background:var(--rb-soft);color:var(--rb)}
.ep-av.rn{background:var(--fill);color:var(--t3)}
.field-lbl{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;padding-left:3px}
.field-in{width:100%;height:52px;border:none;border-radius:13px;padding:0 14px;font-size:17px;font-weight:500;background:var(--fill2);color:var(--t1);-webkit-appearance:none;margin-bottom:18px;position:relative;z-index:1;display:block}
.field-in:focus{outline:none;box-shadow:0 0 0 2px var(--accent)}
.role-grid{display:flex;gap:8px;margin-bottom:20px}
.role-card{flex:1;padding:14px 6px 12px;border:none;border-radius:15px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;background:var(--fill2);user-select:none;border:2.5px solid transparent;transition:border-color .12s,background .12s;-webkit-appearance:none}
.role-card:hover{opacity:.85}
.role-card:active{opacity:.75}
.role-card.rcs-packer{background:var(--rp-soft);border-color:var(--rp)}
.role-card.rcs-runner{background:var(--rr-soft);border-color:var(--rr)}
.role-card.rcs-boxmaker{background:var(--rb-soft);border-color:var(--rb)}
.rc-dot{width:18px;height:18px;border-radius:50%}
.rc-dot.rp{background:var(--rp)}.rc-dot.rr{background:var(--rr)}.rc-dot.rb{background:var(--rb)}
.rc-lbl{font-size:11px;font-weight:700;color:var(--t2)}
.role-card.rcs-packer .rc-lbl{color:var(--rp)}.role-card.rcs-runner .rc-lbl{color:var(--rr)}.role-card.rcs-boxmaker .rc-lbl{color:var(--rb)}
.ep-save{width:100%;padding:15px;border:none;border-radius:14px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px}
.ep-save:active{background:var(--accent2)}
.ep-del{width:100%;padding:13px;border:none;border-radius:14px;background:var(--red-bg);color:var(--red-t);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.ep-del:active{opacity:.7}

/* ─── Sync setup screen ──────────────────────────────────── */
.setup-screen{
  position:fixed;inset:0;background:var(--bg);z-index:500;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px 20px;
}
.setup-card{background:var(--card);border-radius:22px;padding:26px 20px;width:100%;max-width:420px;box-shadow:var(--shadow)}
.setup-icon{font-size:38px;text-align:center;margin-bottom:10px}
.setup-h{font-size:19px;font-weight:800;text-align:center;margin-bottom:5px}
.setup-p{font-size:13px;color:var(--t2);text-align:center;line-height:1.5;margin-bottom:18px}
.setup-steps{display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
.setup-step{display:flex;gap:9px;align-items:flex-start}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-txt{font-size:13px;color:var(--t2);line-height:1.5}
.step-txt a{color:var(--accent);text-decoration:none;font-weight:600}
.setup-err{color:var(--red-t);font-size:12px;text-align:center;margin-bottom:8px;min-height:16px}
.setup-in{width:100%;height:48px;border:none;border-radius:13px;padding:0 13px;font-size:14px;background:var(--fill2);color:var(--t1);-webkit-appearance:none;margin-bottom:10px;font-family:monospace;letter-spacing:.4px}
.setup-in:focus{outline:none;box-shadow:0 0 0 2px var(--accent)}
.setup-btn{width:100%;padding:14px;border:none;border-radius:13px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px}
.setup-btn:active{background:var(--accent2)}
.setup-skip{width:100%;padding:11px;border:none;background:none;color:var(--t3);font-size:13px;cursor:pointer}
</style>
</head>
<body>

<div id="toast" class="toast">
  <span id="tmsg">Updated</span>
  <button class="toast-undo" onclick="undoLast()">Undo</button>
</div>
<div id="root"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════════════════ */
const DEFAULT_STAFF=[
  {n:"Agnes Aruba",r:"packer"},{n:"Aporo Aruba",r:"packer"},{n:"Avarua",r:"packer"},
  {n:"Ayushi Patel",r:"packer"},{n:"Ben McNicholas",r:"packer"},{n:"Brian K",r:"packer"},
  {n:"Charli Murphy",r:"packer"},{n:"Dakota",r:"packer"},{n:"Dewi",r:"packer"},
  {n:"Dhruv Patel",r:"packer"},{n:"Emerald",r:"packer"},{n:"Emmanuel",r:"runner"},
  {n:"Faataga Fao",r:"packer"},{n:"Hillary",r:"packer"},{n:"Hussein Koech",r:"runner"},
  {n:"Isabel Albinus",r:"packer"},{n:"Jasmin Lulio",r:"boxmaker"},{n:"Jet Crozier",r:"packer"},
  {n:"Juanita",r:"packer"},{n:"Karen Brown",r:"packer"},{n:"Koni Latu",r:"runner"},
  {n:"Marta",r:"packer"},{n:"Natalia Tuitama",r:"boxmaker"},{n:"Norhaffezan (Nora)",r:"packer"},
  {n:"Paula Leti",r:"packer"},{n:"Peta",r:"packer"},{n:"Ryan Donald",r:"boxmaker"},
  {n:"Sharon Edmonds",r:"packer"},{n:"Sinuch Soy",r:"packer"},{n:"Toanui Moeara",r:"runner"},
  {n:"Vikki Rakei",r:"packer"},{n:"Walid Mahmodi",r:"packer"},{n:"Waka",r:"packer"},
];
const ROLES=["packer","runner","boxmaker"];
const RL={packer:"Packer",runner:"Runner",boxmaker:"Box maker"};
const RE={packer:"🔵",runner:"⚪️",boxmaker:"🔴"};
const DAYS=["Mon","Tue","Wed","Thu","Fri"];
const STATUS_INFO={
  work: {cls:"sw",badge:"bw",icon:"ti-check",   label:"At work",   short:"At work"},
  absent:{cls:"sa",badge:"ba",icon:"ti-x",       label:"Absent",    short:"Absent"},
  early: {cls:"se",badge:"be",icon:"ti-logout",  label:"Left early",short:"Left early"},
  leave: {cls:"sl",badge:"bl",icon:"ti-calendar-off",label:"On leave",short:"On leave"},
};
const ROLE_CLASS={packer:"rp",runner:"rr",boxmaker:"rb"};

/* ═══════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
let staff=[...DEFAULT_STAFF.map(s=>({...s}))];
let dat={};
// UI
let view="main"; // main|settings|daily|report
let q="", rf="all"; // search, role filter
let wo=0, ad=0;     // week offset, active day
let undo=null, undoTid=null;
// Settings sub-state
let sv="list"; // list|edit|add
let sq="",srf="all",editP=null,eName="",eRole="packer";
// Sync
let ghToken="",gistId="",syncSt="none",saveTid=null;

/* ═══════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════ */
const hap=t=>{try{navigator.vibrate&&navigator.vibrate(t==="m"?20:10)}catch(e){}};
const ini=n=>n.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();
const esc=s=>s.replace(/'/g,"\\'");
const hesc=s=>s.replace(/"/g,"&quot;");

// Dates
const mon=o=>{const d=new Date(),dy=d.getDay();d.setDate(d.getDate()-(dy||7)-6+o*7);d.setHours(0,0,0,0);return d};
// Fix: Mon offset properly
function monDate(o){
  const d=new Date(); const dy=d.getDay();
  d.setDate(d.getDate()-(dy===0?6:dy-1)+o*7);
  d.setHours(0,0,0,0); return d;
}
function wdates(o){const m=monDate(o);return Array.from({length:5},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d;})}
const fd=d=>d.toLocaleDateString("en-AU",{day:"numeric",month:"short"});
const ffl=d=>d.toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"});
const dk=(w,d)=>"w"+w+"d"+d;
const gs=p=>((dat[dk(wo,ad)]||{})[p])||"";
function todayIdx(){const dy=new Date().getDay();return dy===0||dy===6?4:dy-1}
function isToday(i){if(wo!==0)return false;const dy=new Date().getDay();return dy!==0&&dy!==6&&dy-1===i}
function weekLabel(){
  const d=wdates(wo),r=fd(d[0])+" – "+fd(d[4]);
  if(wo===0)return{main:"This week",sub:r};
  if(wo===-1)return{main:"Last week",sub:r};
  if(wo===1)return{main:"Next week",sub:r};
  return{main:r,sub:""};
}
function dayStats(i){
  const dd=dat[dk(wo,i)]||{};
  let a=0,e=0,l=0;
  staff.forEach(s=>{const st=dd[s.n]||"";if(st==="absent")a++;else if(st==="early")e++;else if(st==="leave")l++;});
  return{absent:a,early:e,leave:l};
}
function getFiltered(){
  let list=[...staff];
  if(rf!=="all")list=list.filter(s=>s.r===rf);
  if(q)list=list.filter(s=>s.n.toLowerCase().includes(q.toLowerCase()));
  return list;
}

/* ═══════════════════════════════════════════════════════════
   PERSISTENCE
═══════════════════════════════════════════════════════════ */
function lsSave(){
  try{
    localStorage.setItem("att7_dat",JSON.stringify(dat));
    localStorage.setItem("att7_staff",JSON.stringify(staff));
    localStorage.setItem("att7_ui",JSON.stringify({rf,wo:0}));
    localStorage.setItem("att7_gh",JSON.stringify({ghToken,gistId}));
  }catch(e){}
}
function lsLoad(){
  try{
    const d=localStorage.getItem("att7_dat"),
          s=localStorage.getItem("att7_staff"),
          g=localStorage.getItem("att7_gh");
    if(d)dat=JSON.parse(d);
    if(s)staff=JSON.parse(s);
    if(g){const gg=JSON.parse(g);ghToken=gg.ghToken||"";gistId=gg.gistId||"";}
  }catch(e){}
}

/* ═══════════════════════════════════════════════════════════
   GITHUB GIST SYNC
═══════════════════════════════════════════════════════════ */
function setSyncUI(s){
  syncSt=s;
  const dot=document.getElementById("sdot"),lbl=document.getElementById("slbl");
  if(!dot||!lbl)return;
  dot.className="sync-dot "+s;
  lbl.textContent={none:"Not connected",ok:"Synced ✓",err:"Sync failed — tap Retry",busy:"Syncing…"}[s]||"";
}

async function gistSave(){
  if(!ghToken)return;
  setSyncUI("busy");
  try{
    const payload=JSON.stringify({dat,staff});
    const body={files:{"attendance.json":{content:payload}}};
    const url=gistId?"https://api.github.com/gists/"+gistId:"https://api.github.com/gists";
    const method=gistId?"PATCH":"POST";
    if(!gistId){body.description="Attendance App";body.public=false;}
    const res=await fetch(url,{method,headers:{"Authorization":"token "+ghToken,"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const json=await res.json();
    if(!gistId){gistId=json.id;lsSave();}
    setSyncUI("ok");
  }catch(e){setSyncUI("err");console.warn("Gist save:",e);}
}

async function gistLoad(){
  if(!ghToken||!gistId)return false;
  setSyncUI("busy");
  try{
    const res=await fetch("https://api.github.com/gists/"+gistId,{headers:{"Authorization":"token "+ghToken}});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const json=await res.json();
    const raw=json.files["attendance.json"]?.content;
    if(!raw)throw new Error("No data");
    const p=JSON.parse(raw);
    if(p.dat)dat=p.dat;
    if(p.staff)staff=p.staff;
    lsSave();setSyncUI("ok");return true;
  }catch(e){setSyncUI("err");console.warn("Gist load:",e);return false;}
}

function save(){
  lsSave();
  clearTimeout(saveTid);
  saveTid=setTimeout(gistSave,1000);
}

async function manualSync(){
  if(!ghToken){showSetup();return;}
  const ok=await gistLoad();
  if(ok)render();
}

function showSetup(){
  document.getElementById("setup-screen")?.remove();
  const el=document.createElement("div");
  el.id="setup-screen";el.className="setup-screen";
  el.innerHTML=`<div class="setup-card">
    <div class="setup-icon">🔗</div>
    <div class="setup-h">Connect GitHub Sync</div>
    <div class="setup-p">Keeps your data in sync across all your devices automatically.</div>
    <div class="setup-steps">
      <div class="setup-step"><div class="step-num">1</div><div class="step-txt">Open <a href="https://github.com/settings/tokens/new?scopes=gist&description=Attendance+App" target="_blank">github.com → Settings → Tokens</a></div></div>
      <div class="setup-step"><div class="step-num">2</div><div class="step-txt">Click <strong>Generate new token (classic)</strong>, tick <strong>gist</strong>, generate and copy it.</div></div>
      <div class="setup-step"><div class="step-num">3</div><div class="step-txt">Paste it below and tap Connect.</div></div>
    </div>
    <div class="setup-err" id="setup-err"></div>
    <input class="setup-in" id="setup-tok" placeholder="ghp_xxxxxxxxxxxxxxxx" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"/>
    <button class="setup-btn" onclick="connectGist()">Connect &amp; Sync</button>
    <button class="setup-skip" onclick="document.getElementById('setup-screen').remove()">Skip — use this device only</button>
  </div>`;
  document.body.appendChild(el);
  setTimeout(()=>document.getElementById("setup-tok")?.focus(),80);
}

async function connectGist(){
  const inp=document.getElementById("setup-tok");
  const err=document.getElementById("setup-err");
  const token=(inp?.value||"").trim();
  if(!token){if(err)err.textContent="Paste your token first";return;}
  if(err)err.textContent="Verifying…";
  try{
    const res=await fetch("https://api.github.com/user",{headers:{"Authorization":"token "+token}});
    if(!res.ok)throw new Error("Invalid token ("+res.status+")");
    ghToken=token;
    // Look for existing gist
    const gr=await fetch("https://api.github.com/gists?per_page=100",{headers:{"Authorization":"token "+token}});
    const gists=await gr.json();
    const found=Array.isArray(gists)&&gists.find(g=>g.files["attendance.json"]);
    if(found){
      gistId=found.id;lsSave();
      document.getElementById("setup-screen")?.remove();
      const ok=await gistLoad();
      if(ok)render();else render();
    }else{
      lsSave();
      document.getElementById("setup-screen")?.remove();
      await gistSave();render();
    }
  }catch(e){if(err)err.textContent=e.message||"Connection failed";}
}

function disconnectSync(){
  if(!confirm("Disconnect GitHub sync?\nYour local data stays safe."))return;
  ghToken="";gistId="";lsSave();setSyncUI("none");render();
}

function resetToDefault(){
  if(!confirm("Reset staff list to the default?\nThis removes any added/deleted staff.\nAttendance records stay."))return;
  staff=DEFAULT_STAFF.map(s=>({...s}));
  save();toast("Staff list reset");sv="list";renderSettings();
}

/* ═══════════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════════ */
function toast(msg,withUndo=false){
  document.getElementById("tmsg").textContent=msg;
  const tu=document.querySelector(".toast-undo");
  if(tu)tu.style.display=withUndo?"":"none";
  document.getElementById("toast").classList.add("show");
  clearTimeout(undoTid);
  undoTid=setTimeout(()=>document.getElementById("toast").classList.remove("show"),2800);
}
function undoLast(){
  if(!undo)return;
  const{k,p,prev}=undo;
  if(!dat[k])dat[k]={};
  dat[k][p]=prev;undo=null;hap();save();
  document.getElementById("toast").classList.remove("show");
  patchRow(p);updateStats();updateDayPip(ad);
}

/* ═══════════════════════════════════════════════════════════
   ATTENDANCE ACTIONS
═══════════════════════════════════════════════════════════ */
function toggle(p,s){
  const k=dk(wo,ad);if(!dat[k])dat[k]={};
  undo={k,p,prev:dat[k][p]||""};
  const nv=dat[k][p]===s?"":s;
  dat[k][p]=nv;hap();save();
  patchRow(p);updateStats();updateDayPip(ad);
  toast(nv?(STATUS_INFO[nv]?.label+" ✓"):"Cleared",!!nv);
}

function markAllWork(){
  const k=dk(wo,ad);if(!dat[k])dat[k]={};
  const vis=getFiltered();
  const all=vis.every(s=>dat[k][s.n]==="work");
  vis.forEach(s=>{dat[k][s.n]=all?"":"work";});
  hap("m");save();render();
  toast(all?"Cleared all":"All marked at work ✓");
}

function clearDay(){
  const k=dk(wo,ad);dat[k]={};hap("m");save();render();toast("Day cleared");
}

function cw(d){wo+=d;hap();render();}
function goToday(){wo=0;ad=todayIdx();q="";render();}
function selDay(i){ad=i;hap();render();}
function setRF(r){rf=r;save();render();}

/* ═══════════════════════════════════════════════════════════
   DOM PATCHING (fast path — no full re-render)
═══════════════════════════════════════════════════════════ */
function patchRow(p){
  const el=document.querySelector(`.row[data-p="${CSS.escape(p)}"]`);
  if(!el)return;
  const st=gs(p),si=STATUS_INFO[st],role=el.getAttribute("data-r");
  el.className="row"+(si?" "+si.cls:"");
  el.setAttribute("data-r",role);
  // Patch badge
  const b=el.querySelector(".badge");
  if(b){
    b.className="badge"+(si?" "+si.badge:" bn");
    b.innerHTML=si?`<i class="ti ${si.icon}"></i>${si.short}`:"";
  }
  // Patch stripe (no colour class needed — CSS handles via row class)
  // Patch active button highlight (CSS-driven, no JS needed)
}

function updateStats(){
  const s=dayStats(ad),w=staff.length-s.absent-s.early-s.leave;
  [["sw",w],["sa",s.absent],["se",s.early],["sl",s.leave]].forEach(([id,v])=>{
    const el=document.getElementById(id);if(el)el.textContent=v;
  });
}

function updateDayPip(i){
  const has=Object.values(dat[dk(wo,i)]||{}).some(v=>v);
  const btn=document.querySelector(`.day-btn[data-i="${i}"]`);if(!btn)return;
  const pip=btn.querySelector(".d-pip"),ph=btn.querySelector(".d-ph");
  if(has&&i!==ad){if(!pip&&ph)ph.className="d-pip";}
  else{if(pip&&i!==ad)pip.className="d-ph";}
}

/* ═══════════════════════════════════════════════════════════
   STAFF MANAGEMENT
═══════════════════════════════════════════════════════════ */
function openSettings(){view="settings";sv="list";sq="";editP=null;render();}
function closeSettings(){view="main";render();}

function openEdit(n){
  const s=staff.find(x=>x.n===n);if(!s)return;
  editP={...s};eName=s.n;eRole=s.r;sv="edit";renderSettings();
}
function openAdd(){
  editP=null;eName="";eRole="packer";sv="add";renderSettings();
  setTimeout(()=>document.getElementById("en")?.focus(),80);
}

function saveEdit(){
  // Always read direct from input — most reliable on both mobile and PC
  const inp=document.getElementById("en");
  const newName=(inp?inp.value:"").trim();
  if(!newName){
    if(inp){inp.focus();inp.style.boxShadow="0 0 0 2px var(--red)";}
    toast("Please enter a name");return;
  }
  const newRole=eRole;
  if(sv==="add"){
    if(staff.find(s=>s.n===newName)){toast("Name already exists");if(inp)inp.focus();return;}
    staff.push({n:newName,r:newRole});
    save();toast(newName+" added ✓");
  }else{
    const oldName=editP.n;
    const idx=staff.findIndex(x=>x.n===oldName);
    if(idx<0)return;
    if(newName!==oldName){
      // Rename in attendance data
      Object.values(dat).forEach(day=>{
        if(oldName in day){day[newName]=day[oldName];delete day[oldName];}
      });
    }
    staff[idx]={n:newName,r:newRole};
    save();toast("Saved ✓");
  }
  sv="list";editP=null;renderSettings();
}

function delPerson(){
  if(!editP)return;
  const n=editP.n;
  if(!confirm("Remove "+n+" from staff?\nThis also clears their attendance history."))return;
  staff=staff.filter(x=>x.n!==n);
  Object.values(dat).forEach(d=>{delete d[n];});
  save();toast(n+" removed");sv="list";editP=null;renderSettings();
}

function setERole(r){
  eRole=r;
  document.querySelectorAll(".role-card").forEach(c=>{
    const cr=c.getAttribute("data-r");
    const map={packer:"rcs-packer",runner:"rcs-runner",boxmaker:"rcs-boxmaker"};
    c.className="role-card"+(cr===r?" "+map[cr]:"");
  });
  const av=document.getElementById("ep-av");
  if(av)av.className="ep-av "+ROLE_CLASS[eRole];
}

/* ═══════════════════════════════════════════════════════════
   REPORTS
═══════════════════════════════════════════════════════════ */
function buildDailySummary(){
  const date=wdates(wo)[ad],dd=dat[dk(wo,ad)]||{};
  const tw=staff.filter(s=>dd[s.n]==="work").length;
  const ta=staff.filter(s=>dd[s.n]==="absent").length;
  const te=staff.filter(s=>dd[s.n]==="early").length;
  const tl=staff.filter(s=>dd[s.n]==="leave").length;
  const bk={};ROLES.forEach(r=>{bk[r]={w:[],a:[],e:[],l:[]};});
  staff.forEach(s=>{const st=dd[s.n]||"",b=bk[s.r];if(st==="work")b.w.push(s.n);else if(st==="absent")b.a.push(s.n);else if(st==="early")b.e.push(s.n);else if(st==="leave")b.l.push(s.n);});
  const lines=["📋 Shift Summary — "+ffl(date),""];
  lines.push("👥 On floor: "+(tw+te)+" / "+staff.length);
  lines.push("✅ At work: "+tw);
  if(te)lines.push("🚪 Left early: "+te);
  if(ta)lines.push("❌ Absent: "+ta);
  if(tl)lines.push("📅 Leave/sick: "+tl);
  lines.push("");
  ROLES.forEach(r=>{
    const b=bk[r],total=staff.filter(s=>s.r===r).length;if(!total)return;
    lines.push(RE[r]+" "+RL[r]+"s: "+(b.w.length+b.e.length)+" / "+total);
    if(b.a.length)lines.push("  ❌ Absent: "+b.a.join(", "));
    if(b.e.length)lines.push("  🚪 Left early: "+b.e.join(", "));
    if(b.l.length)lines.push("  📅 Leave: "+b.l.join(", "));
  });
  return lines.join("\n");
}

function buildWeeklyReport(){
  const dates=wdates(wo),lbl=weekLabel();
  const sec={absent:[],early:[],leave:[]};
  DAYS.forEach((_,i)=>{
    const dd=dat[dk(wo,i)]||{};
    staff.forEach(s=>{const st=dd[s.n]||"";if(sec[st])sec[st].push("  • "+s.n+" ("+RL[s.r]+") — "+ffl(dates[i]));});
  });
  const lines=["Attendance — "+lbl.main+" ("+lbl.sub+")\n"];
  if(sec.absent.length){lines.push("Absent:");sec.absent.forEach(l=>lines.push(l));lines.push("");}
  if(sec.early.length){lines.push("Left early:");sec.early.forEach(l=>lines.push(l));lines.push("");}
  if(sec.leave.length){lines.push("Leave / sick:");sec.leave.forEach(l=>lines.push(l));lines.push("");}
  if(!sec.absent.length&&!sec.early.length&&!sec.leave.length)lines.push("No absences this week.");
  return lines.join("\n");
}

function shareText(id,btnId){
  const text=document.getElementById(id)?.innerText||"";
  if(navigator.share){navigator.share({text});return;}
  navigator.clipboard.writeText(text).then(()=>{
    const b=document.getElementById(btnId);if(!b)return;
    const orig=b.innerHTML;
    b.innerHTML='<i class="ti ti-check" style="font-size:15px"></i> Copied!';
    setTimeout(()=>{b.innerHTML=orig;},2000);
  });
}

/* ═══════════════════════════════════════════════════════════
   SWIPE
═══════════════════════════════════════════════════════════ */
let rtx=0,rp2=null;
function rts(e,p){rtx=e.touches[0].clientX;rp2=p;}
function rte(e,p){
  if(rp2!==p)return;
  if(Math.abs(e.changedTouches[0].clientX-rtx)>70&&gs(p)){
    const k=dk(wo,ad);undo={k,p,prev:dat[k][p]||""};dat[k][p]="";hap("m");save();
    patchRow(p);updateStats();updateDayPip(ad);toast("Cleared",true);
  }
}
let ptx=0,pty=0;
document.addEventListener("touchstart",e=>{if(!e.target.closest(".row")){ptx=e.touches[0].clientX;pty=e.touches[0].clientY;}},{passive:true});
document.addEventListener("touchend",e=>{
  if(view!=="main"||e.target.closest(".row,.sp"))return;
  const dx=e.changedTouches[0].clientX-ptx,dy=e.changedTouches[0].clientY-pty;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5)cw(dx<0?1:-1);
},{passive:true});

/* ═══════════════════════════════════════════════════════════
   SETTINGS RENDER
═══════════════════════════════════════════════════════════ */
function renderSettings(){
  let root=document.getElementById("sp-root");
  if(!root){
    root=document.createElement("div");root.id="sp-root";
    document.getElementById("root").after(root);
  }

  if(sv==="list"){
    let list=[...staff].sort((a,b)=>a.n.localeCompare(b.n));
    if(srf!=="all")list=list.filter(s=>s.r===srf);
    if(sq)list=list.filter(s=>s.n.toLowerCase().includes(sq.toLowerCase()));
    const grp={packer:[],runner:[],boxmaker:[]};
    list.forEach(s=>{if(grp[s.r])grp[s.r].push(s);});
    const cnt={packer:staff.filter(s=>s.r==="packer").length,runner:staff.filter(s=>s.r==="runner").length,boxmaker:staff.filter(s=>s.r==="boxmaker").length};
    const showHeads=srf==="all"&&!sq;
    let rows="";
    ROLES.forEach(r=>{
      if(!grp[r].length)return;
      if(showHeads)rows+=`<div class="sp-group-head">${RE[r]} ${RL[r]}s (${grp[r].length})</div>`;
      grp[r].forEach(s=>{
        rows+=`<div class="srow" onclick="openEdit('${esc(s.n)}')">
          <div class="srow-av ${ROLE_CLASS[s.r]}">${ini(s.n)}</div>
          <div class="srow-info"><div class="srow-name">${s.n}</div><span class="srow-chip ${ROLE_CLASS[s.r]}">${RL[s.r]}</span></div>
          <i class="ti ti-chevron-right srow-arr"></i>
        </div>`;
      });
    });

    root.innerHTML=`<div class="sp">
      <div class="sp-top">
        <button class="sp-back" onclick="closeSettings()"><i class="ti ti-chevron-left"></i><span>Back</span></button>
        <span class="sp-title">Staff (${staff.length})</span>
        <button class="sp-add" onclick="openAdd()"><i class="ti ti-plus" style="font-size:12px"></i> Add</button>
      </div>
      <div class="sp-search"><i class="ti ti-search sp-si"></i>
        <input placeholder="Search…" value="${hesc(sq)}" oninput="sq=this.value;renderSettings()" autocomplete="off" autocorrect="off" autocapitalize="words"/>
      </div>
      <div class="sp-filter">
        <button class="sf${srf==="all"?" on-all":""}" onclick="srf='all';renderSettings()">All ${staff.length}</button>
        <button class="sf${srf==="packer"?" on-packer":""}" onclick="srf='packer';renderSettings()">🔵 Packers ${cnt.packer}</button>
        <button class="sf${srf==="runner"?" on-runner":""}" onclick="srf='runner';renderSettings()">⚪️ Runners ${cnt.runner}</button>
        <button class="sf${srf==="boxmaker"?" on-boxmaker":""}" onclick="srf='boxmaker';renderSettings()">🔴 Box makers ${cnt.boxmaker}</button>
      </div>
      <div class="sp-list">${rows||'<div class="empty" style="padding:40px 0"><i class="ti ti-user-search"></i>No staff found</div>'}</div>
      <div style="padding:8px 14px 4px;flex-shrink:0;display:flex;gap:6px;flex-wrap:wrap">
        ${ghToken?`<button class="sp-footer-btn danger" onclick="disconnectSync()"><i class="ti ti-brand-github" style="font-size:12px"></i> Disconnect sync</button>`:""}
        <button class="sp-footer-btn" onclick="resetToDefault()"><i class="ti ti-refresh" style="font-size:12px"></i> Reset staff list</button>
      </div>
    </div>`;
    return;
  }

  // Edit / Add
  const isAdd=sv==="add";
  const dName=isAdd?eName:(editP?.n||"");
  const rCards=ROLES.map(r=>{
    const map={packer:"rcs-packer",runner:"rcs-runner",boxmaker:"rcs-boxmaker"};
    return`<button class="role-card${eRole===r?" "+map[r]:""}" data-r="${r}" onclick="setERole('${r}')">
      <div class="rc-dot ${ROLE_CLASS[r]}"></div>
      <div class="rc-lbl">${RL[r]}</div>
    </button>`;
  }).join("");

  root.innerHTML=`<div class="sp">
    <div class="sp-top">
      <button class="sp-back" onclick="sv='list';renderSettings()"><i class="ti ti-chevron-left"></i><span>Staff</span></button>
      <span class="sp-title">${isAdd?"New employee":"Edit"}</span>
      <button class="ep-save-top" onclick="saveEdit()">${isAdd?"Add":"Save"}</button>
    </div>
    <div class="ep-scroll">
      <div class="field-lbl">Full name</div>
      <input class="field-in" id="en" value="${hesc(dName)}" placeholder="e.g. Jane Smith"
        autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false"
        onkeydown="if(event.key==='Enter'){event.preventDefault();saveEdit();}"/>
      <div class="field-lbl">Role</div>
      <div class="role-grid">${rCards}</div>
      <button class="ep-save" onclick="saveEdit()">
        <i class="ti ti-${isAdd?"plus":"check"}" style="font-size:15px"></i>
        ${isAdd?"Add to staff":"Save changes"}
      </button>
      ${!isAdd?`<button class="ep-del" onclick="delPerson()">
        <i class="ti ti-trash" style="font-size:15px"></i> Remove from staff
      </button>`:""}
    </div>
  </div>`;
  setTimeout(()=>document.getElementById("en")?.focus(),80);
}

/* ═══════════════════════════════════════════════════════════
   MAIN RENDER
═══════════════════════════════════════════════════════════ */
function render(){
  if(view!=="settings")document.getElementById("sp-root")?.remove();

  const dates=wdates(wo),lbl=weekLabel(),canShare=!!navigator.share;

  // Sheet views
  if(view==="daily"||view==="report"){
    const isDaily=view==="daily";
    const txt=isDaily?buildDailySummary():buildWeeklyReport();
    const tid=isDaily?"drep":"wrep",bid=isDaily?"dbtn":"wbtn";
    document.getElementById("root").innerHTML=`<div class="overlay" onclick="view='main';render()">
      <div class="sheet" onclick="event.stopPropagation()">
        <div class="handle"></div>
        <div class="sheet-head">
          <span class="sheet-title">${isDaily?"End of shift":"Weekly report"}</span>
          <button class="close-btn" onclick="view='main';render()"><i class="ti ti-x"></i></button>
        </div>
        <div class="report-txt" id="${tid}">${txt}</div>
        <button class="sheet-btn primary" id="${bid}" onclick="shareText('${tid}','${bid}')">
          <i class="ti ti-${canShare?"share-2":"copy"}" style="font-size:15px"></i>${canShare?"Share":"Copy to clipboard"}
        </button>
      </div>
    </div>`;
    return;
  }

  // Build main HTML
  const dst=dayStats(ad),atWork=staff.length-dst.absent-dst.early-dst.leave;
  const k=dk(wo,ad),dd=dat[k]||{};
  const filtered=getFiltered();
  const allWork=filtered.length>0&&filtered.every(s=>dd[s.n]==="work");
  const rc={packer:0,runner:0,boxmaker:0};
  staff.forEach(s=>{if(rc[s.r]!==undefined)rc[s.r]++;});

  const dayStrip=DAYS.map((d,i)=>{
    const hasPip=Object.values(dat[dk(wo,i)]||{}).some(v=>v);
    const cls=[ad===i?"sel":"",isToday(i)?"today":""].filter(Boolean).join(" ");
    return`<button class="day-btn ${cls}" data-i="${i}" onclick="selDay(${i})">
      <span class="d-lbl">${d}</span>
      <span class="d-num">${dates[i].getDate()}</span>
      <span class="${hasPip&&ad!==i?"d-pip":"d-ph"}"></span>
    </button>`;
  }).join("");

  const roleTabs=`<div class="role-tabs">
    <button class="role-tab${rf==="all"?" on-all":""}" onclick="setRF('all')"><span class="rt-num">${staff.length}</span><span class="rt-lbl">All</span></button>
    <button class="role-tab${rf==="packer"?" on-packer":""}" onclick="setRF('packer')"><span class="rt-num">${rc.packer}</span><span class="rt-lbl">🔵 Packers</span></button>
    <button class="role-tab${rf==="runner"?" on-runner":""}" onclick="setRF('runner')"><span class="rt-num">${rc.runner}</span><span class="rt-lbl">⚪️ Runners</span></button>
    <button class="role-tab${rf==="boxmaker"?" on-boxmaker":""}" onclick="setRF('boxmaker')"><span class="rt-num">${rc.boxmaker}</span><span class="rt-lbl">🔴 Box makers</span></button>
  </div>`;

  // Group: unmarked first, marked below sorted by status
  const none=filtered.filter(s=>!dd[s.n]);
  const marked=filtered.filter(s=>!!dd[s.n]);
  const sOrd={work:0,absent:1,early:2,leave:3};
  marked.sort((a,b)=>(sOrd[dd[a.n]]||0)-(sOrd[dd[b.n]]||0));

  const makeRow=s=>{
    const st=gs(s.n),si=STATUS_INFO[st],ep=esc(s.n);
    return`<div class="row${si?" "+si.cls:""}" data-p="${hesc(s.n)}" data-r="${s.r}" ontouchstart="rts(event,'${ep}')" ontouchend="rte(event,'${ep}')">
      <div class="stripe"></div>
      <div class="name-col">
        <span class="nm">${s.n}</span>
        <div class="chips">
          <span class="rc ${ROLE_CLASS[s.r]}">${RL[s.r]}</span>
          ${si?`<span class="badge ${si.badge}"><i class="ti ${si.icon}"></i>${si.short}</span>`:`<span class="badge bn"></span>`}
        </div>
      </div>
      <div class="sbs">${Object.entries(STATUS_INFO).map(([sk,si2])=>`<button class="sb" data-s="${sk}" onclick="toggle('${ep}','${sk}')" aria-label="${si2.label}"><i class="ti ${si2.icon}"></i></button>`).join("")}</div>
    </div>`;
  };

  let rows="";
  if(!filtered.length){
    rows=`<div class="rows"><div class="empty"><i class="ti ti-user-search"></i>${q?'No one named "'+q+'"':('No '+(RL[rf]||'staff')+' found')}</div></div>`;
  }else{
    if(none.length&&marked.length){
      // Two separate card groups
      rows=`<div class="rows">${none.map(makeRow).join("")}</div>
      <div class="sec-head"><span class="sec-lbl">Marked</span><span class="sec-cnt">${marked.length}</span></div>
      <div class="rows">${marked.map(makeRow).join("")}</div>`;
    }else{
      rows=`<div class="rows">${[...none,...marked].map(makeRow).join("")}</div>`;
    }
  }

  // Sync label
  const syncLabel=ghToken
    ?(syncSt==="ok"?"Synced ✓":(syncSt==="busy"?"Syncing…":(syncSt==="err"?"Sync failed":"Connected")))
    :"Not synced";
  const syncBtn=ghToken
    ?`<button class="sync-action" onclick="manualSync()"><i class="ti ti-refresh" style="font-size:10px"></i> Sync</button>`
    :`<button class="sync-action primary" onclick="showSetup()"><i class="ti ti-brand-github" style="font-size:10px"></i> Connect</button>`;

  document.getElementById("root").innerHTML=`<div class="app">
    <div class="topbar">
      <div class="wknav">
        <button class="nav-arrow" onclick="cw(-1)"><i class="ti ti-chevron-left"></i></button>
        <div class="wklbl" onclick="goToday()">${lbl.main}${lbl.sub?`<small>${lbl.sub}</small>`:""}</div>
        <button class="nav-arrow" onclick="cw(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="search-wrap">
        <i class="ti ti-search search-icon"></i>
        <input class="search-input" placeholder="Search…" value="${hesc(q)}" oninput="q=this.value;render()" autocomplete="off" autocorrect="off" autocapitalize="none"/>
        ${q?`<button class="search-x" onclick="q='';render()"><i class="ti ti-x" style="font-size:8px"></i></button>`:""}
      </div>
      <button class="icon-btn" onclick="view='daily';render()" title="End of shift"><i class="ti ti-clipboard-list"></i></button>
      <button class="icon-btn" onclick="view='report';render()" title="Weekly report"><i class="ti ti-file-text"></i></button>
      <button class="icon-btn" onclick="openSettings()" title="Staff"><i class="ti ti-users"></i></button>
    </div>

    <div class="sync-bar">
      <div class="sync-dot ${syncSt}" id="sdot"></div>
      <span class="sync-lbl" id="slbl">${syncLabel}</span>
      ${syncBtn}
    </div>

    <div class="sticky">
      <div class="days">${dayStrip}</div>
      ${roleTabs}
      <div class="stats">
        <div class="stat sw"><div class="stat-ico"><i class="ti ti-check" style="color:var(--green)"></i></div><div class="stat-num" id="sw" style="color:var(--green-t)">${atWork}</div><div class="stat-lbl">At work</div></div>
        <div class="stat sa"><div class="stat-ico"><i class="ti ti-user-x" style="color:var(--red)"></i></div><div class="stat-num" id="sa" style="color:var(--red-t)">${dst.absent}</div><div class="stat-lbl">Absent</div></div>
        <div class="stat se"><div class="stat-ico"><i class="ti ti-logout" style="color:var(--orange)"></i></div><div class="stat-num" id="se" style="color:var(--orange-t)">${dst.early}</div><div class="stat-lbl">Left early</div></div>
        <div class="stat sl"><div class="stat-ico"><i class="ti ti-calendar-off" style="color:var(--blue)"></i></div><div class="stat-num" id="sl" style="color:var(--blue-t)">${dst.leave}</div><div class="stat-lbl">Leave</div></div>
      </div>
    </div>

    <div class="qbar">
      <button class="qbtn qa" onclick="markAllWork()"><i class="ti ${allWork?"ti-x":"ti-check"}" style="font-size:12px"></i>${allWork?"Clear all":"All at work"}</button>
      <button class="qbtn qc" onclick="clearDay()"><i class="ti ti-eraser" style="font-size:12px"></i>Clear day</button>
    </div>

    <div style="padding:0 12px">${rows}</div>
  </div>`;

  if(view==="settings")renderSettings();
}

/* ═══════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════ */
lsLoad();
ad=todayIdx();
render();
if(ghToken&&gistId){
  gistLoad().then(ok=>{if(ok)render();});
}
</script>
</body>
</html>
